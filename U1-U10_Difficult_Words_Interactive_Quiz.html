<style>
:root{--primary:#1a3a5c;--primary2:#2a5298;--accent:#c8962e;--ok:#2d7a4f;--bad:#b53a2f;--bg:#faf8f5;--card:#fff;--line:#dde3ea;--muted:#6b7a8d;--clue:#fff3a3}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:#1e2a35;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:var(--primary);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 10px #0003}
.title{font-family:"Playfair Display",serif;font-size:1.05rem}.title span{color:#f1c86b}.score{white-space:nowrap;background:#ffffff22;border-radius:20px;padding:5px 13px;font-size:.84rem;font-weight:700}
.wrap{max-width:780px;margin:0 auto;padding:18px 14px 56px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 3px 16px #1a3a5c14;padding:20px;margin-bottom:14px}
h1{font-family:"Playfair Display",serif;color:var(--primary);font-size:1.75rem;margin-bottom:9px}.sub{font-size:.91rem;line-height:1.65;color:var(--muted);margin-bottom:15px}
label{display:block;font-size:.77rem;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin:11px 0 6px}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font:inherit}input:focus,select:focus{outline:none;border-color:var(--primary)}
button{font:inherit;cursor:pointer;border:0}.primary{width:100%;margin-top:16px;padding:13px;border-radius:10px;background:var(--primary);color:#fff;font-weight:700}.primary:hover{background:var(--primary2)}
.progress-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:7px}.track{height:6px;background:#dde3ea;border-radius:4px;overflow:hidden;margin-bottom:14px}.fill{height:100%;background:var(--accent);transition:width .3s}
.qnum{font-size:.76rem;color:var(--accent);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.passage{font-size:1rem;line-height:1.8;margin-bottom:14px}.blank{font-weight:700;color:var(--primary);border-bottom:2px solid var(--accent)}
.w{cursor:pointer;border-bottom:1px dotted #aaa}.w:hover{background:#fef9ec}.w.clue{background:var(--clue);border-radius:3px;padding:0 2px}
.helper{display:none;background:#eef4fb;border-left:4px solid var(--accent);padding:10px 13px;border-radius:0 8px 8px 0;margin-bottom:13px;font-size:.84rem;line-height:1.5}.helper.show{display:block}.helper strong{color:var(--primary)}.helper-cn{color:#6a4c93;font-weight:600}
.listen{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;color:var(--primary);font-size:.8rem;margin-bottom:12px}.opts{display:grid;gap:9px}.opt{display:flex;align-items:center;gap:10px;text-align:left;width:100%;padding:11px 13px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-size:.91rem}.opt:hover:not(:disabled){border-color:var(--primary);background:#f0f4fa}.letter{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%;border:1.5px solid currentColor;font-size:.75rem;font-weight:700;flex:none}.opt.correct{background:#e8f5ee;border-color:var(--ok);color:var(--ok)}.opt.wrong{background:#faeaea;border-color:var(--bad);color:var(--bad)}
.feedback{display:none;background:#f5f7fa;border:1px solid var(--line);border-radius:10px;margin-top:13px;padding:12px}.feedback.show{display:block}.fb-title{font-size:.76rem;color:var(--muted);font-weight:700;margin-bottom:8px;text-transform:uppercase}.fb-item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:.82rem;line-height:1.45}.fb-item.answer{border-color:var(--ok);background:#e8f5ee}.fb-word{font-weight:700;color:var(--primary)}.fb-cn{color:#6a4c93;font-weight:600}
.next{display:none;width:100%;padding:12px;background:var(--primary);color:#fff;border-radius:10px;font-weight:700;margin-top:12px}.next.show{display:block}
.end{text-align:center}.grade{font-family:"Playfair Display",serif;font-size:3rem;color:var(--primary);margin:7px}.end p{color:var(--muted);line-height:1.5}.review{text-align:left;margin-top:15px;background:#f5f7fa;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:.84rem;line-height:1.55}.review strong{color:var(--primary)}
.status{display:none;margin-top:12px;padding:10px;border-radius:8px;font-size:.86rem}.status.ok{display:block;color:var(--ok);background:#e8f5ee}.status.err{display:block;color:var(--bad);background:#faeaea}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}.actions button{padding:12px;border-radius:9px;font-weight:700}.send{background:var(--ok);color:#fff}.again{background:var(--primary);color:#fff}
#quiz,#result{display:none}@media(max-width:520px){.card{padding:15px}.actions{grid-template-columns:1fr}.title{font-size:.95rem}}

<header><div class="title">4000 Essential Words Level 5 <span>Units 1-10</span></div><div class="score">Score: <span id="score">0</span> / <span id="total">0</span></div></header>

  <section id="start" class="card">
    <h1>Difficult Words Quiz</h1>
    <p class="sub">Review the difficult words and extended vocabulary from Units 1-10. Each question uses one of your class sentences. Tap any passage word for a definition.</p>
    <label for="studentName">Student name</label>

    <button class="primary" onclick="startQuiz()">Start quiz</button>
  </section>

    <div class="progress-row"><span id="progressText"></span><span id="progressPct"></span></div>

      <div class="qnum" id="qnum"></div>

      <div class="feedback" id="feedback"></div>
      <button class="next" id="next" onclick="nextQuestion()">Next question</button>
    </div>
  </section>
  <section id="result" class="card end">
    <h1>Quiz complete!</h1>
    <div class="grade" id="finalScore"></div>

    <div class="review" id="review"></div>

    <div class="actions"><button class="send" onclick="submitResult()">Send result again</button><button class="again" onclick="location.reload()">Try again</button></div>

<script>
const GOOGLE_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwN0JbQwvPmsAphNhq9F0nWY8s5Ttr_NLeVofihnI1BqNU_2L4-aa3SRavPkEyUKC7trg/exec";
const UNIT_NAME="4000 Essential Words Level 5 Units 1-10 Difficult Words";
const WORDS=[{"word":"soothing","pos":"adj.","cat":"adj","en":"Calming and relaxing","cn":"舒緩的","sentence":"The therapist played some __________ music during the massage. It helped the stressed patient finally feel peaceful and quiet.","cnSentence":"治療師在按摩過程中播放了一些舒緩的音樂。這幫助壓力大的病人終於感到平靜和安詳。"},{"word":"soothe","pos":"v.","cat":"v","en":"To gently calm a person","cn":"撫慰","sentence":"The mother tried to __________ her crying baby by rocking him. Eventually, the child stopped screaming and fell fast asleep.","cnSentence":"母親試著透過搖晃大哭的嬰兒來撫慰他。最終，孩子停止了尖叫並陷入熟睡。"},{"word":"subtle","pos":"adj.","cat":"adj","en":"Not obvious or easy to notice","cn":"微妙的","sentence":"There is a __________ difference between these two blue paints. You must look very closely to see the slight color change.","cnSentence":"這兩種藍色油漆之間有微妙的差別。你必須非常仔細地觀察才能看到輕微的顏色變化。"},{"word":"subtly","pos":"adv.","cat":"adv","en":"In a quiet, hard-to-notice way","cn":"巧妙地","sentence":"The lights in the theater __________ dimmed before the movie began. Most people didn\u0027t notice the change until it was dark.","cnSentence":"電影開始前，劇院裡的燈光悄悄地變暗了。大多數人直到全黑才注意到變化。"},{"word":"subtlety","pos":"n.","cat":"n","en":"The quality of being delicate","cn":"微妙","sentence":"The chef’s dish relied on the __________ of expensive spices. However, the strong sauce completely ruined the delicate, hidden flavors.","cnSentence":"廚師的菜餚依靠昂貴香料的微妙之處。然而，濃郁的醬汁完全破壞了細膩且隱藏的風味。"},{"word":"textural","pos":"adj.","cat":"adj","en":"Relating to texture","cn":"質地的","sentence":"The artist added __________ details to the painting using thick oil. Now, the canvas feels very rough instead of being flat.","cnSentence":"藝術家使用厚油彩為畫作增添了質地細節。現在，畫布感覺非常粗糙，而不是平整的。"},{"word":"fabric","pos":"n.","cat":"n","en":"The sensation of something","cn":"觸感/織物","sentence":"I love the soft __________ of this expensive silk shirt. It feels much smoother on my skin than cheap cotton clothes.","cnSentence":"我喜歡這件昂貴絲綢襯衫柔軟的觸感。它在我的皮膚上感覺比廉價的棉衣要光滑得多。"},{"word":"toxin","pos":"n.","cat":"n","en":"A poisonous substance","cn":"毒素","sentence":"The doctor explained that a dangerous __________ entered his blood. He needs strong medicine to remove the poison from his body.","cnSentence":"醫生解釋說，一種危險的毒素進入了他的血液。他需要強效藥物來排除體內的毒素。"},{"word":"toxicity","pos":"n.","cat":"n","en":"The quality of being toxic","cn":"毒性","sentence":"Scientists are testing the __________ of the chemicals in the lake. High levels of poison could kill all the local fish.","cnSentence":"科學家正在測試湖中化學物質的毒性。高水平的毒物可能會殺死所有當地的魚類。"},{"word":"poisonous","pos":"adj.","cat":"adj","en":"Causing or capable of causing death","cn":"劇毒的","sentence":"You should never eat those __________ red berries in the woods. Just one small bite can make a person very sick.","cnSentence":"你絕對不應該吃森林裡那些有毒的紅莓。只要吃一小口就能讓人病得很重。"},{"word":"differ from","pos":"v.","cat":"v","en":"To be unlike","cn":"有區別","sentence":"My opinions on the project __________ greatly_____ my partner’s ideas. We need a long meeting to discuss our different views.","cnSentence":"我對這個項目的看法與我夥伴的想法大不相同。我們需要開一個長會來討論我們不同的觀點。"},{"word":"fleet admiral","pos":"n.","cat":"n","en":"A high-ranking naval officer","cn":"艦隊司令","sentence":"The __________ commanded over fifty ships during the large ocean battle. Every sailor followed his orders to protect the home coast.","cnSentence":"在這場大型海戰中，艦隊司令指揮了五十多艘船。每位水兵都聽從他的命令來保護家鄉海岸。"},{"word":"arc","pos":"n.","cat":"n","en":"A curved shape","cn":"弧形","sentence":"The basketball followed a perfect __________ through the air to the hoop. It was a beautiful, curved shot from the three-point line.","cnSentence":"籃球在空中劃出一道完美的弧線進入籃筐。這是從三分線投出的一個美麗的弧形投籃。"},{"word":"arch","pos":"n.","cat":"n","en":"A curved symmetrical structure","cn":"拱門","sentence":"We walked through the ancient stone __________ to enter the old city. The curved doorway was built hundreds of years ago.","cnSentence":"我們穿過古老的石拱門進入老城。這個弧形的門口是幾百年前建造的。"},{"word":"character","pos":"n.","cat":"n","en":"Your personality","cn":"性格","sentence":"Traveling alone can really build your __________. It forces you to become independent and shows who you truly are inside.","cnSentence":"獨自旅行真的可以磨練你的性格。它迫使你變得獨立，並展現出你內心真實的一面。"},{"word":"Chinese character","pos":"n.","cat":"n","en":"Font / symbol of a language","cn":"中文字","sentence":"It takes many years to learn every __________ in the book. Each symbol has a unique meaning and a specific history.","cnSentence":"學習書中的每一個中文字需要很多年的時間。每個符號都有獨特的含義和特定的歷史。"},{"word":"characteristic","pos":"adj.","cat":"adj","en":"Typical of a particular person","cn":"特有的","sentence":"It is __________ of him to be late for every meeting. He is never on time, no matter how important the event.","cnSentence":"每次會議都遲到是他特有的習性。無論活動多麼重要，他從不準時。"},{"word":"characterize","pos":"v.","cat":"v","en":"To describe the nature of","cn":"描繪...的特性","sentence":"Critics __________ the new film as a masterpiece of modern art. They say it perfectly shows the beauty of nature and life.","cnSentence":"評論家將這部新電影描繪為現代藝術的傑作。他們說它完美地展現了自然與生命之美。"},{"word":"conscience","pos":"n.","cat":"n","en":"Inner sense of right and wrong","cn":"良心","sentence":"His __________ started to bother him after he told a lie. He felt so guilty that he couldn\u0027t sleep at all.","cnSentence":"在撒謊後，他的良心開始感到不安。他感到非常愧疚，以至於完全睡不著。"},{"word":"clear conscience","pos":"n.","cat":"n","en":"Freedom from guilt","cn":"問心無愧","sentence":"I can sleep well because I have a __________ about the situation. I know I did my best to help everyone.","cnSentence":"我可以睡得很好，因為我對這件事問心無愧。我知道我已經盡力幫助每個人了。"},{"word":"conscientious","pos":"adj.","cat":"adj","en":"Wishing to do what is right","cn":"盡責的/認真的","sentence":"She is a __________ student who always completes her homework early. She pays attention to every detail to ensure there are no mistakes.","cnSentence":"她是一個盡責的學生，總是提前完成作業。她注意每一個細節以確保沒有錯誤。"},{"word":"consciously","pos":"adv.","cat":"adv","en":"In a deliberate manner","cn":"有意識地","sentence":"I __________ chose to eat more vegetables to improve my health. I am making a real effort to avoid eating junk food.","cnSentence":"我有意識地選擇吃更多蔬菜來改善健康。我正努力避免吃垃圾食物。"},{"word":"unconscious","pos":"adj.","cat":"adj","en":"Not awake due to injury","cn":"失去知覺的","sentence":"The driver was __________ for several minutes after the terrible car accident. Doctors worked quickly to check if he was breathing properly.","cnSentence":"慘烈的車禍後，司機失去了幾分鐘的知覺。醫生們迅速檢查他是否呼吸正常。"},{"word":"subconscious","pos":"n.","cat":"n","en":"Part of mind not fully aware","cn":"潛意識","sentence":"Sometimes our dreams reveal fears hidden deep in our __________. We don\u0027t think about them during the day, but they remain inside.","cnSentence":"有時我們的夢境會揭示隱藏在潛意識深處的恐懼。我們白天不會想到它們，但它們仍存在於內心。"},{"word":"subconsciously","pos":"adv.","cat":"adv","en":"Doing something without realizing","cn":"潛意識地","sentence":"He __________ taps his pen on the desk when he is nervous. He doesn\u0027t even notice he is doing it until someone asks him to stop.","cnSentence":"他緊張時會潛意識地用筆敲桌子。直到有人叫他停止，他甚至都沒察覺到自己在這麼做。"},{"word":"fiery","pos":"adj.","cat":"adj","en":"Burning strongly / intense","cn":"火爆的 / 燃燒般的","sentence":"The sunset turned the sky a __________ orange and red. It looked like the clouds were actually catching fire over the ocean.","cnSentence":"日落將天空染成了火紅的橙色和紅色。看起來雲朵就像在海洋上燃燒一樣。"},{"word":"fury","pos":"n.","cat":"n","en":"Wild or violent anger","cn":"狂怒","sentence":"You could see the __________ in his eyes when he discovered the lie. He was so angry that he started shaking.","cnSentence":"當他發現謊言時，你可以看到他眼中燃燒的狂怒。他氣到全身發抖。"},{"word":"furious","pos":"adj.","cat":"adj","en":"Extremely angry","cn":"極其憤怒的","sentence":"My boss was __________ because I lost the important client\u0027s files. She shouted at me for ten minutes in front of everyone.","cnSentence":"我的老闆非常生氣，因為我弄丟了重要客戶的檔案。她在眾人面前對我吼了十分鐘。"},{"word":"rage","pos":"v.","cat":"v","en":"To speak or act with fury","cn":"肆虐 / 發怒","sentence":"The storm continued to __________ throughout the night, destroying many small trees. The wind blew so hard that the windows rattled.","cnSentence":"暴風雨整晚都在肆虐，摧毀了許多小樹。風刮得非常猛烈，窗戶都嘎嘎作響。"},{"word":"fierce","pos":"adj.","cat":"adj","en":"Powerful and aggressive","cn":"兇猛的 / 猛烈的","sentence":"The two teams had a __________ competition to win the gold medal. They played with so much power and energy until the end.","cnSentence":"兩支隊伍為了贏得金牌展開了激烈的競爭。他們充滿力量與活力地比賽直到最後。"},{"word":"reckless","pos":"adj.","cat":"adj","en":"Not thinking about danger","cn":"魯莽的","sentence":"Driving at such high speeds in the rain is extremely __________. You might cause a serious accident and hurt other innocent people.","cnSentence":"在雨中以如此高速度行駛是非常魯莽的。你可能會造成嚴重的事故並傷害其他無辜的人。"},{"word":"flame","pos":"n.","cat":"n","en":"A bright piece of burning gas","cn":"火焰","sentence":"He struck a match and watched the tiny __________ dance. The small light was enough to help him see the dark path.","cnSentence":"他劃著一根火柴，看著微小的火焰跳動。那微弱的光足以幫助他看清黑暗的小徑。"},{"word":"inflame","pos":"v.","cat":"v","en":"to provoke or intensify strong feelings in someone","cn":"激起(強烈感情)","sentence":"The politician\u0027s controversial comments served only to __________ the already tense situation between the two groups.","cnSentence":"該政治家極具爭議的評論只會激化兩大群體之間本已緊張的局勢。"},{"word":"inflammation","pos":"n.","cat":"n","en":"A localized physical condition in which part of the body becomes reddened","cn":"發炎","sentence":"Aspirin reduces symptoms like pain and _______________ in your eyes and skin.","cnSentence":"阿司匹林可緩解疼痛和發炎等症狀"},{"word":"arouse","pos":"v.","cat":"v","en":"To awaken interest or attention","cn":"引起 / 喚醒","sentence":"The mysterious book cover managed to __________ her curiosity. She immediately opened it to find out what happened to the missing girl.","cnSentence":"神秘的書封成功引起了她的好奇心。她立刻打開書，想找出那個失蹤女孩發生了什麼事。"},{"word":"awaken","pos":"v.","cat":"v","en":"To rouse from sleep or inaction","cn":"喚醒","sentence":"The loud sound of the alarm clock will __________ him at six. He needs to get up early to catch the morning train.","cnSentence":"鬧鐘巨大的響聲將在六點喚醒他。他需要早起去趕早班火車。"},{"word":"rise-rose-risen","pos":"v.","cat":"v","en":"To move upwards (intransitive)","cn":"上升 / 升起","sentence":"We watched the sun __________ slowly over the calm blue ocean. It was a beautiful morning, and the temperature began to go up.","cnSentence":"我們看著太陽從平靜的藍色海洋上緩慢升起。那是一個美麗的早晨，氣溫開始上升。"},{"word":"raise-raised","pos":"v.","cat":"v","en":"To lift something up (transitive)","cn":"舉起 / 提高 / 養育","sentence":"Please __________ your hand if you have a question about the lesson. The teacher will call on you once she finishes the current page.","cnSentence":"如果你對課程有疑問，請舉手。老師講完這一頁後就會叫你回答。"},{"word":"arise-arose-arisen","pos":"v.","cat":"v","en":"To happen or occur (abstract)","cn":"出現 / 產生","sentence":"Problems often __________ when people do not communicate clearly with each other. Small misunderstandings can grow into big arguments if not fixed.","cnSentence":"當人們溝通不清楚時，問題往往會出現。如果不解決，小誤會可能會演變成大爭執。"},{"word":"emerge","pos":"v.","cat":"v","en":"To come out into view","cn":"浮現 / 出現","sentence":"The sun began to __________ from behind the thick, dark clouds. After the long storm, the bright light finally made everything look warm.","cnSentence":"太陽開始從厚重的黑雲背後浮現。長久的風暴過後，明亮的光芒終於讓一切看起來很溫暖。"},{"word":"emerging","pos":"adj.","cat":"adj","en":"Starting to exist or appear","cn":"新興的 / 露頭的","sentence":"Technology is an __________ field with many new jobs appearing every year. Young students should learn coding to prepare for these future opportunities.","cnSentence":"科技是一個新興領域，每年都有許多新工作出現。年輕學生應該學習程式碼，為這些未來的機會做準備。"},{"word":"tart","pos":"adj.","cat":"adj","en":"Sharp or acid in taste","cn":"酸的","sentence":"I found the green apples to be quite __________. I had to add a lot of sugar to the pie to make it sweet enough to eat.","cnSentence":"我覺得這些青蘋果相當酸。我必須在派裡加入大量的糖，才能讓它甜到可以食用。"},{"word":"stake","pos":"n.","cat":"n","en":"A sharp piece of wood/metal","cn":"樁","sentence":"The camper hammered a wooden __________ into the hard ground. It was necessary to keep the tent from blowing away during the night.","cnSentence":"露營者將一根木樁錘入堅硬的地面。這對於防止帳篷在夜間被吹走是必要的。"},{"word":"at stake","pos":"phrase","cat":"phr","en":"At risk","cn":"在危險中 / 成敗關頭","sentence":"Thousands of jobs are __________ if the large factory closes down. The local government is working hard to find a way to save the business.","cnSentence":"如果這家大工廠倒閉，數千個工作崗位將面臨威脅。當地政府正努力尋找拯救這家企業的方法。"},{"word":"steward","pos":"n.","cat":"n","en":"Server on planes and ships","cn":"乘務員 / 管家","sentence":"The __________ walked down the aisle to offer drinks to the passengers. He was very polite and helped everyone feel comfortable during the long flight.","cnSentence":"乘務員走在過道上為乘客提供飲料。他非常有禮貌，幫助每個人在漫長的飛行中感到舒適。"},{"word":"stewardship","pos":"n.","cat":"n","en":"The job of supervising","cn":"管理","sentence":"Good __________ of the forest is important for protecting rare animals. We must manage the land carefully so that future generations can enjoy nature.","cnSentence":"對森林的良好管理對於保護稀有動物至關重要。我們必須仔細管理這片土地，以便子孫後代能夠享受自然。"},{"word":"string","pos":"n.","cat":"n","en":"A thin piece of fabric or rope","cn":"繩子 / 細線","sentence":"I used a long piece of __________ to tie the heavy package together. It is much thinner than rope but strong enough for this small box.","cnSentence":"我用一根長繩子把沉重的包裹捆在一起。它比繩索薄得多，但對這個小箱子來說已經足夠結實了。"},{"word":"thread","pos":"n.","cat":"n","en":"Thin, flexible string for sewing","cn":"絚線","sentence":"My grandmother put a thin __________ through the needle to fix my shirt. She chose a blue color that matched the fabric perfectly.","cnSentence":"我祖母把一根細線穿過針頭來修補我的襯衫。她選了與布料完美匹配的藍色。"},{"word":"thorn","pos":"n.","cat":"n","en":"A sharp part of a plant","cn":"刺","sentence":"Be careful when you pick the roses because every stem has a sharp __________. If you are not careful, it will cut your finger.","cnSentence":"摘玫瑰時要小心，因為每根莖上都有尖銳的刺。如果你不小心，它會割傷你的手指。"},{"word":"a thorn in one\u0027s side","pos":"phrase","cat":"phr","en":"A constant source of annoyance","cn":"芒刺在背 / 煩惱的原因","sentence":"That noisy neighbor has been __________ for years. No matter how many times we complain, he continues to play loud music at night.","cnSentence":"那個吵鬧的鄰居多年來一直是我的心頭大患。無論我們投訴多少次，他晚上還是繼續放響亮的音樂。"},{"word":"prickle","pos":"n.","cat":"n","en":"A short pointed outgrowth","cn":"刺","sentence":"The small __________ on the cactus might look soft, but they are actually quite sharp. You should avoid touching the plant with your bare hands.","cnSentence":"仙人掌上的小刺看起來可能很柔軟，但實際上非常尖銳。你應該避免用手直接觸摸這種植物。"},{"word":"wreck","pos":"v.","cat":"v","en":"To destroy or ruin","cn":"破壞 / 遇難","sentence":"The heavy rain will __________ our plans for an outdoor picnic today. We will have to stay home and eat our lunch inside instead.","cnSentence":"大雨將破壞我們今天戶外野餐的計劃。我們不得不待在家裡在室內吃午餐。"},{"word":"wreckage","pos":"n.","cat":"n","en":"Remains of something destroyed","cn":"殘骸","sentence":"Workers spent the whole day clearing the __________ of the fallen building. They found broken pieces of wood and metal scattered everywhere.","cnSentence":"工人們花了一整天的時間清理倒塌建築的殘骸。他們發現到處散落著破碎的木頭和金屬。"},{"word":"admonish","pos":"v.","cat":"v","en":"To tell someone you disapprove","cn":"責備 / 告誡","sentence":"The teacher had to __________ the students for talking during the exam. She told them that they must remain silent or they would fail.","cnSentence":"老師不得不因為學生在考試中交談而責備他們。她告訴他們必須保持安靜，否則就會不及格。"},{"word":"admonition","pos":"n.","cat":"n","en":"A firm warning or reprimand","cn":"警告","sentence":"The principal’s __________ made the boys realize they were in big trouble. After the warning, they promised never to break the school rules again.","cnSentence":"校長的告誡讓男孩們意識到他們惹了大麻煩。在警告之後，他們保證再也不會違反校規。"},{"word":"abolish","pos":"v.","cat":"v","en":"To officially end a system/law","cn":"廢除","sentence":"Many people hope the government will __________ the unfair tax law. They believe that ending this rule will help poor families save more money.","cnSentence":"許多人希望政府能廢除這項不公平的稅法。他們相信取消這項規定將有助於貧困家庭節省更多錢。"},{"word":"abolishment","pos":"n.","cat":"n","en":"The act of ending a law","cn":"廢除","sentence":"The __________ of slavery is one of the most important events in history. This official ending of the system gave freedom to millions of people.","cnSentence":"廢除奴隸制度是歷史上最重要的事件之一。這種制度的正式結束給予了數百萬人自由。"},{"word":"reprimand","pos":"v.","cat":"v","en":"To rebuke formally","cn":"申斥","sentence":"The boss decided to __________ the employee for being late three times. This formal warning was put into the worker\u0027s permanent office record.","cnSentence":"老闆決定因為該員工三次遲到而對其進行申斥。這次正式警告被計入了該員工的永久辦公室紀錄中。"},{"word":"scold","pos":"v.","cat":"v","en":"To reprimand someone","cn":"責罵","sentence":"My parents will __________ me if I come home after midnight. They are very strict about my curfew and want me to stay safe.","cnSentence":"如果我半夜以後才回家，我的父母會責罵我。他們對我的宵禁非常嚴格，希望我能保持安全。"},{"word":"audible","pos":"adj.","cat":"adj","en":"Able to be heard","cn":"可聽見的","sentence":"His whisper was barely __________ in the noisy room. I had to lean in very close just to understand what he was saying.","cnSentence":"在吵鬧的房間裡，他的耳語幾乎聽不見。我不得不湊得很近才能理解他在說什麼。"},{"word":"inaudible","pos":"adj.","cat":"adj","en":"Unable to be heard","cn":"聽不見的","sentence":"The TV volume was so low that the news was completely __________. I couldn\u0027t hear a single word even though I was sitting right there.","cnSentence":"電視音量太低了，以至於新聞完全聽不見。儘管我就坐在那裡，卻一個字也聽不到。"},{"word":"audio","pos":"adj.","cat":"adj","en":"Relating to sound","cn":"音訊的 / 可聽到到的","sentence":"The teacher used an __________ recording to test our listening skills. We had to listen carefully to the speaker’s voice to answer the questions.","cnSentence":"老師使用音訊錄音來測試我們的聽力技巧。我們必須仔細聆聽說話者的聲音來回答問題。"},{"word":"awesome","pos":"adj.","cat":"adj","en":"Impressive or frightening","cn":"令人敬畏的 / 極好的","sentence":"The view from the top of the mountain was absolutely __________. I felt so small looking at the giant peaks and the deep green valleys.","cnSentence":"從山頂看到的景色絕對令人敬畏。看著巨大的山峰和深綠色的山谷，我感到自己如此渺小。"},{"word":"awe","pos":"n.","cat":"n","en":"A feeling of deep respect","cn":"敬畏","sentence":"The students stood in __________ as they looked at the ancient pyramids. They couldn\u0027t believe people built such massive structures thousands of years ago.","cnSentence":"學生們看著古老的金字塔，心中充滿敬畏。他們不敢相信幾千年前的人們能建造出如此巨大的建築。"},{"word":"in awe","pos":"phrase","cat":"phr","en":"Feeling great respect","cn":"敬畏地 / 驚嘆地","sentence":"I was __________ of her musical talent after hearing her play the violin. Her performance was so beautiful that the entire audience stayed silent.","cnSentence":"聽完她拉小提琴後，我對她的音樂天賦感到驚嘆。她的表演如此優美，全場觀眾都保持安靜。"},{"word":"incredible","pos":"adj.","cat":"adj","en":"Impossible to believe","cn":"難以置信的","sentence":"It is __________ that he survived the plane crash without any injuries. Everyone who heard the news was shocked by his amazing luck.","cnSentence":"他在飛機失事中竟然毫髮無傷，真是令人難以置信。每個聽到這個消息的人都對他驚人的好運感到震驚。"},{"word":"caution","pos":"n.","cat":"n","en":"Care taken to avoid danger","cn":"謹慎","sentence":"You must proceed with __________ when driving through a heavy storm. The rain makes it hard to see other cars on the road.","cnSentence":"在大風暴中開車時，你必須謹慎行事。大雨讓人很難看清路上的其他車輛。"},{"word":"cautious","pos":"adj.","cat":"adj","en":"Careful to avoid problems","cn":"謹慎的","sentence":"He is a very __________ investor who never takes big risks with his money. He prefers to save his earnings in a safe bank account.","cnSentence":"他是一位非常謹慎的投資者，從不拿自己的錢冒大風險。他更喜歡把收入存在安全的銀行帳戶裡。"},{"word":"equip","pos":"v.","cat":"v","en":"To supply with necessary items","cn":"配備","sentence":"The school plans to __________ every classroom with a smart whiteboard. They want to provide teachers with the best tools for digital learning.","cnSentence":"學校計劃為每間教室配備智能白板。他們希望為老師提供最好的數位學習工具。"},{"word":"equipment","pos":"n.","cat":"n","en":"Things used for a specific purpose","cn":"設備 / 裝備","sentence":"We need to buy some professional __________ before we go camping in the mountains. We especially need a strong tent and warm sleeping bags.","cnSentence":"在去山裡露營之前，我們需要買一些專業設備。我們特別需要一個結實的帳篷和溫暖的睡袋。"},{"word":"piece of equipment","pos":"phrase","cat":"phr","en":"A single item of equipment","cn":"一件設備","sentence":"This expensive __________ is used to measure the purity of the lake water. It is a very delicate tool and must be handled with care.","cnSentence":"這件昂貴的設備用於測量湖水的純度。它是一個非常精細的工具，必須小心處理。"},{"word":"gear","pos":"n.","cat":"n","en":"Equipment for a particular purpose","cn":"裝備","sentence":"Don\u0027t forget to pack your swimming __________ for the beach trip this weekend. You will need your goggles, fins, and a high-quality swimsuit.","cnSentence":"別忘了為這週末的海邊旅行帶上你的游泳裝備。你會需要泳鏡、蛙鞋和一件高品質的泳衣。"},{"word":"wearable device","pos":"n.","cat":"n","en":"A tech gadget you can wear","cn":"穿戴式裝置","sentence":"A smartwatch is a common __________ that tracks your daily physical activity. It can monitor your heart rate and count how many steps you walk.","cnSentence":"智慧手錶是一種常見的穿戴式裝置，可以追踪你的日常體育活動。它可以監測你的心跳並計算你走了多少步。"},{"word":"gadget","pos":"n.","cat":"n","en":"A small useful tool or machine","cn":"小配件 / 裝置","sentence":"This clever kitchen __________ can peel and slice an entire apple in seconds. It saves a lot of time when you are making many pies.","cnSentence":"這個聰明的廚房小裝置可以在幾秒鐘內削皮並切開一整顆蘋果。當你要做很多派時，它能節省很多時間。"},{"word":"horn","pos":"n.","cat":"n","en":"A device that makes a loud noise","cn":"喇叭","sentence":"The driver pressed the __________ on his steering wheel to warn the person walking. The loud noise made everyone on the street look up quickly.","cnSentence":"司機按下了方向盤上的喇叭來警告走路的人。巨大的響聲讓街道上的每個人都迅速抬起頭來。"},{"word":"honk","pos":"v.","cat":"v","en":"To use the horn of a car","cn":"按喇叭","sentence":"Please do not __________ while you are driving through the quiet hospital zone. The noise might disturb the sick patients who are trying to rest.","cnSentence":"當你開車經過安靜的醫院區域時，請不要按喇叭。噪音可能會打擾到正在努力休息的病患。"},{"word":"stimulate","pos":"v.","cat":"v","en":"To raise levels of activity","cn":"刺激","sentence":"Drinking coffee in the morning can __________ your brain and make you feel more awake. It increases your energy levels so you can start working immediately.","cnSentence":"早上喝咖啡可以刺激你的大腦，讓你感覺更清醒。它會提高你的能量水平，讓你能夠立即開始工作。"},{"word":"stimulation","pos":"n.","cat":"n","en":"The act of raising activity","cn":"刺激","sentence":"Small children need a lot of mental __________ to help their brains grow. Playing with colorful toys and reading stories provides the necessary excitement for learning.","cnSentence":"幼兒需要大量的智力刺激來幫助大腦發育。玩色彩鮮豔的玩具和讀故事為學習提供了必要的興奮感。"},{"word":"simulate","pos":"v.","cat":"v","en":"To copy or model a situation","cn":"模擬","sentence":"Pilots use special computers to __________ flying in a dangerous storm. This allows them to practice their skills safely without actually being in a real plane.","cnSentence":"飛行員使用特殊的電腦來模擬在危險風暴中飛行。這讓他們可以安全地練習技巧，而不需要實際待在真正的飛機上。"},{"word":"simulation","pos":"n.","cat":"n","en":"An imitation of a process","cn":"模擬","sentence":"The astronauts underwent a __________ of a moon landing before their actual mission. This practice run helped them prepare for any problems that might happen.","cnSentence":"太空人在實際執行任務之前進行了月球登陸模擬。這次練習幫助他們為可能發生的任何問題做好準備。"},{"word":"articulate","pos":"adj.","cat":"adj","en":"Able to express ideas clearly","cn":"表達清晰的","sentence":"She is an __________ speaker who can explain complex topics in a very simple way. Everyone in the audience understood her message perfectly.","cnSentence":"她是一位表達清晰的演講者，能以非常簡單的方式解釋複雜的話題。聽眾中的每個人都完全理解了她傳達的信息。"},{"word":"articulation","pos":"n.","cat":"n","en":"The action of putting into words","cn":"發音 / 表達","sentence":"Clear __________ is important if you want to be a successful news reporter. You must pronounce every word carefully so the listeners can hear you.","cnSentence":"如果你想成為一名成功的新聞記者，清晰的發音非常重要。你必須仔細發音每個單詞，以便聽眾能聽到你的聲音。"},{"word":"eloquent","pos":"adj.","cat":"adj","en":"Fluent or persuasive in speaking","cn":"雄辯的 / 有說服力的","sentence":"The politician gave an __________ speech that convinced everyone to vote for him. He spoke so beautifully and powerfully that many people were moved to tears.","cnSentence":"這位政治家發表了一篇雄辯的演講，說服了每個人投票給他。他的演講如此優美且有力，許多人都感動得落淚。"},{"word":"eloquence","pos":"n.","cat":"n","en":"Fluent or persuasive speaking","cn":"雄辯 / 口才","sentence":"Her natural __________ made her the best choice for the school\u0027s debate team. She can express her ideas with such grace and power that she always wins.","cnSentence":"她天生的口才使她成為學校辯論隊的最佳人選。她能以如此優雅且有力量的方式表達自己的想法，以至於她總是獲勝。"},{"word":"clingy","pos":"adj.","cat":"adj","en":"Liable to cling / attached","cn":"黏人的 / 緊貼的","sentence":"The toddler became very __________ when his mother tried to leave the room. He grabbed her leg and cried because he didn\u0027t want to be alone.","cnSentence":"當母親試圖離開房間時，這名幼兒變得非常黏人。他抓住她的腿大哭，因為他不想一個人待著。"},{"word":"grip","pos":"v.","cat":"v","en":"To take a firm hold of","cn":"緊握","sentence":"He had to __________ the steering wheel tightly as he drove through the heavy rain. The strong wind made the car move from side to side.","cnSentence":"當他在大雨中開車時，他必須緊握方向盤。強風使汽車左右搖晃。"},{"word":"grasp","pos":"v.","cat":"v","en":"To seize and hold firmly","cn":"抓牢","sentence":"It was hard for the child to __________ the large ball with his small hands. He tried several times before he finally managed to pick it up.","cnSentence":"孩子用小手抓牢大球很困難。他嘗試了好幾次才終於把它撿起來。"},{"word":"comply with","pos":"v.","cat":"v","en":"To act according to a command","cn":"遵守","sentence":"All citizens must _______________ the local traffic regulations. If you break the speed limit, you will have to pay a very expensive fine.","cnSentence":"所有公民都必須遵守當地的交通法規。如果你違反限速規定，你將不得不支付昂貴的罰款。"},{"word":"compliance","pos":"n.","cat":"n","en":"The act of following a rule","cn":"順從 / 遵守","sentence":"The company is in full __________ with the new safety laws. They changed their factory rules to ensure all workers are protected from accidents.","cnSentence":"該公司完全遵守新的安全法律。他們更改了工廠規則，以確保所有工人免受事故傷害。"},{"word":"compliant","pos":"adj.","cat":"adj","en":"Inclined to obey rules:obedient","cn":"順從的","sentence":"The __________ dog sat down immediately when its owner gave the command. It is very well-trained and always listens to what it is told.","cnSentence":"當主人發出命令時，那隻順從的狗立刻坐了下來。它訓練有素，總是聽從指令。"},{"word":"law-abiding","pos":"adj.","cat":"adj","en":"Obeying the law","cn":"守法的","sentence":"Most people are __________ citizens who never get into trouble with the police. They pay their taxes and follow all the rules of society.","cnSentence":"大多數人都是守法的公民，從不給警察惹麻煩。他們繳稅並遵守所有的社會規則。"},{"word":"obey","pos":"v.","cat":"v","en":"To do what you are told","cn":"服從 / 遵守","sentence":"Drivers must __________ all traffic signs to keep the roads safe for everyone. If a sign says \"Stop,\" you must come to a full halt.","cnSentence":"駕駛者必須遵守所有交通標誌，以確保每個人的道路安全。如果標誌寫著「停止」，你必須完全停下來。"},{"word":"obedient","pos":"adj.","cat":"adj","en":"Willing to obey","cn":"服從的 / 聽話的","sentence":"An __________ student follows the school rules without complaining. They listen to the teacher and complete their work exactly as they are asked.","cnSentence":"一個服從的學生會毫無怨言地遵守校規。他們聽老師的話，並完全按照要求完成工作。"},{"word":"obedience","pos":"n.","cat":"n","en":"Compliance with an order","cn":"服從","sentence":"Training a puppy requires a lot of patience to teach it __________. It takes many weeks before the dog learns to stay when you tell it.","cnSentence":"訓練小狗需要很多耐心來教導它服從。這需要很多週的時間，狗狗才能學會在你叫它留下時保持不動。"},{"word":"disobey","pos":"v.","cat":"v","en":"To refuse to do what is told","cn":"不服從 / 違反","sentence":"If you __________ the safety rules in the laboratory, you might cause a dangerous accident. Always listen to the teacher to avoid getting hurt.","cnSentence":"如果你違反實驗室的安全守則，可能會引發危險事故。務必聽從老師的指導以避免受傷。"},{"word":"disobedient","pos":"adj.","cat":"adj","en":"Refusing to obey rules","cn":"不服從的 / 不聽話的","sentence":"The __________ child refused to go to bed when his father asked. He continued to play with his toys and ignored every command.","cnSentence":"那個不聽話的孩子在父親要求時拒絕上床睡覺。他繼續玩玩具，無視所有指令。"},{"word":"disobedience","pos":"n.","cat":"n","en":"Failure to obey","cn":"不服從 / 違抗","sentence":"The soldier was punished for his __________ during the important mission. He did not follow the captain\u0027s orders, which put the team in danger.","cnSentence":"那名士兵因在重要任務中的違抗行為而受罰。他沒有聽從隊長的命令，使團隊陷入危險。"},{"word":"rebel","pos":"n.","cat":"n","en":"A person who fights against authority","cn":"反抗者 / 叛逆者","sentence":"As a teenager, he was a bit of a __________ who always broke the rules. He wore strange clothes and refused to listen to his teachers.","cnSentence":"青少年時期，他有點叛逆，總是違反規則。他穿著奇怪的衣服，拒絕聽老師的話。"},{"word":"rebellious","pos":"adj.","cat":"adj","en":"Showing a desire to resist authority","cn":"叛逆的 / 造反的","sentence":"The __________ students organized a protest against the new school uniform policy. They felt that the strict rules limited their ability to express themselves.","cnSentence":"叛逆的學生們組織了一場抗議，反對新的校服政策。他們覺得嚴格的規則限制了他們表達自我的能力。"},{"word":"rebellion","pos":"n.","cat":"n","en":"An act of violent or open resistance","cn":"造反 / 叛亂","sentence":"The government used the army to stop the __________ in the northern provinces. Many people were arrested during the fight for control of the region.","cnSentence":"政府動用軍隊制止北部省份的叛亂。在爭奪該地區控制權的戰鬥中，許多人被捕。"},{"word":"overthrow-otherthrew-overthrown","pos":"v.","cat":"v","en":"to remove a leader or government by force","cn":"推翻","sentence":"The rebel forces conspired to __________ the military dictator and establish a democratic provisional government.","cnSentence":"反叛力量密謀推翻軍事獨裁者，並建立民主臨時政府。"},{"word":"coup","pos":"n.","cat":"n","en":"a sudden, violent, and illegal seizure of power","cn":"政變","sentence":"After the failed __________, many high-ranking officers were arrested for attempting to subvert the constitution.","cnSentence":"在那次失敗的政變後，許多高階軍官因試圖顛覆憲法而被捕。"},{"word":"admiral","pos":"n.","cat":"n","en":"the highest rank of commander in a navy","cn":"海軍上將","sentence":"As a fleet __________, he was responsible for coordinating all naval operations across the Pacific theater during the war.","cnSentence":"作為艦隊上將，他負責協調戰爭期間整個太平洋戰區的所有海軍行動。"},{"word":"admire","pos":"v.","cat":"v","en":"appreciate","cn":"欽佩","sentence":"The audience _________ the gold medalist\u0027s courage, persistence, and determination. He is the inspiration of the country.","cnSentence":"admiration"},{"word":"admiration","pos":"n.","cat":"n","en":"respect and warm approval","cn":"欽佩","sentence":"Her tireless dedication to humanitarian causes has earned her the deep __________ of colleagues and world leaders alike.","cnSentence":"她對人道主義事業的不懈投入，贏得了同事和世界領導人的深切欽佩。"},{"word":"conspiracy","pos":"n.","cat":"n","en":"a secret plan by a group to do something unlawful","cn":"陰謀","sentence":"The journalists uncovered a vast __________ involving corporate executives and politicians to fix market prices.","cnSentence":"記者們揭露了一個涉及企業高管和政治家操縱市場價格的龐大陰謀。"},{"word":"consensus","pos":"n.","cat":"n","en":"a general agreement among a group","cn":"共識","sentence":"Despite hours of intense debate, the committee failed to reach a __________ on the new environmental policy.","cnSentence":"儘管進行了數小時的激烈辯論，委員會仍未能就新的環境政策達成共識。"},{"word":"conscious","pos":"adj.","cat":"adj","en":"aware of and responding to one\u0027s surroundings","cn":"有意識的","sentence":"Although he was badly injured in the accident, he remained __________ enough to tell the paramedics his name.","cnSentence":"儘管他在事故中受了重傷，但他仍保持清醒，足以告訴醫護人員他的名字。"},{"word":"consciousness","pos":"n.","cat":"n","en":"the state of being awake and aware","cn":"意識","sentence":"The patient slowly regained __________ after the surgery, but he was still feeling very groggy from the anesthesia.","cnSentence":"手術後病人緩慢恢復了意識，但受麻醉影響仍感到非常昏沉。"},{"word":"agony","pos":"n.","cat":"n","en":"extreme physical or mental suffering","cn":"極度痛苦","sentence":"Waiting for the rescue team to arrive was pure __________ for the hikers trapped in the freezing cave.","cnSentence":"對於困在冰冷洞穴中的登山者來說，等待救援隊的到來簡直是極度的煎熬。"},{"word":"cynical","pos":"adj.","cat":"adj","en":"believing that people are motivated purely by self-interest","cn":"憤世嫉俗的","sentence":"Years of working in politics had made him __________ about the possibility of genuine social reform.","cnSentence":"多年的從政生涯讓他對真正社會變革的可能性感到憤世嫉俗。"},{"word":"exclaim","pos":"v.","cat":"v","en":"to cry out suddenly in surprise, anger, or pain","cn":"呼喊","sentence":"\"I can\u0027t believe we actually won!\" she managed to __________ as the final results were announced on screen.","cnSentence":"當屏幕上公佈最終結果時，她不禁大聲呼喊：「我不敢相信我們竟然贏了！」"},{"word":"harass","pos":"v.","cat":"v","en":"to subject to aggressive pressure or intimidation","cn":"騷擾","sentence":"The law is designed to protect employees from managers who __________ them with constant, unreasonable demands.","cnSentence":"該法律旨在保護員工免受那些以持續、不合理的要求來騷擾他們的經理之害。"},{"word":"evaluate","pos":"v.","cat":"v","en":"to judge the quality, importance, or value of something","cn":"評估","sentence":"The board of directors will meet next week to __________ the long-term viability of the proposed merger.","cnSentence":"董事會將於下週開會，以評估提議併購案的長期可行性。"},{"word":"evaluation","pos":"n.","cat":"n","en":"the process of judging or calculating the quality of something","cn":"評鑑 / 評估","sentence":"After the pilot program ended, the school conducted a thorough __________ to see if student performance had improved.","cnSentence":"實驗計畫結束後，學校進行了徹底的評估，以了解學生的表現是否有所提升。"},{"word":"assess","pos":"v.","cat":"v","en":"to carefully consider a situation or person to make a judgment","cn":"評定 / 估價","sentence":"Insurance adjusters were sent to the coastal town to __________ the extent of the damage caused by the hurricane.","cnSentence":"保險理賠員被派往沿海小鎮，以評定颶風造成的損害程度。"},{"word":"assessment","pos":"n.","cat":"n","en":"the act of judging or deciding the amount or value of something","cn":"考核 / 評估","sentence":"The continuous __________ model allows teachers to track student progress through small weekly quizzes rather than one final exam.","cnSentence":"持續性考核模式讓老師能透過每週的小測驗來追蹤學生進度，而非僅靠一次期末考。"},{"word":"resolve","pos":"v.","cat":"v","en":"to find a solution to a problem or dispute","cn":"解決","sentence":"The mediator\u0027s primary goal was to __________ the conflict between the labor union and the management without a strike.","cnSentence":"調解人的首要目標是在不發生罷工的情況下，解決工會與資方之間的衝突。"},{"word":"divine","pos":"adj.","cat":"adj","en":"related to or coming from a god or extremely good","cn":"神聖的；非凡的","sentence":"The sunrise over the mountains was truly ________; it felt like a spiritual experience.","cnSentence":"山上的日出景緻真是非凡，感覺就像是一次靈性體驗。"},{"word":"humid","pos":"adj.","cat":"adj","en":"containing extremely small drops of water in the air","cn":"潮濕的","sentence":"The tropical rainforest is incredibly ________ and hot. The ________ air makes it difficult for sweat to evaporate.","cnSentence":"熱帶雨林非常潮濕且炎熱。潮濕的空氣使得汗水難以蒸發。"},{"word":"humidity","pos":"n.","cat":"n","en":"the amount of water vapor present in the air","cn":"濕度","sentence":"High ________ levels can make a summer day feel much hotter than it actually is. Plants in this greenhouse thrive on high ________.","cnSentence":"高濕度會讓夏日感覺比實際溫度更熱。這座溫室裡的植物在高度濕潤下茁壯成長。"},{"word":"dense","pos":"adj.","cat":"adj","en":"having parts that are packed very close together","cn":"稠密的；濃厚的","sentence":"It was difficult to see through the ________ fog while driving. The ________ population in the city means apartments are very small.","cnSentence":"開車時很難看穿濃霧。城市裡稠密的人口意味著公寓都非常小。"},{"word":"density","pos":"n.","cat":"n","en":"the degree to which something is filled with people or things","cn":"密度","sentence":"The population ________ of Macau is among the highest in the world. Scientists measured the ________ of the new alloy to test its strength.","cnSentence":"澳門的人口密度居世界前列。科學家測量了這種新合金的密度以測試其強度。"},{"word":"volume","pos":"n.","cat":"n","en":"the amount of space that an object or substance occupies","cn":"體積；音量","sentence":"In physics class, we learned how to calculate the ________ of a sphere. Please turn down the ________ of the television; it is too loud.","cnSentence":"在物理課上，我們學習了如何計算球體的體積。請調低電視音量，太吵了。"},{"word":"mass","pos":"n.","cat":"n","en":"a large amount of substance that has no particular shape","cn":"質量；團/塊","sentence":"Gravity is determined by the ________ of an object. A huge ________ of dark clouds gathered on the horizon before the storm.","cnSentence":"重力是由物體的質量決定的。暴風雨前，地平線上聚集了一大團烏雲。"},{"word":"odor","pos":"n.","cat":"n","en":"a distinctive smell, especially an unpleasant one","cn":"氣味；臭味","sentence":"The strong ________ of rotten eggs usually indicates a gas leak. Garlic has a very pungent ________ that lingers in the kitchen.","cnSentence":"腐爛雞蛋的強烈氣味通常表示瓦斯外洩。大蒜有一種非常辛辣且在廚房揮之不去的氣味。"},{"word":"classification","pos":"n.","cat":"n","en":"the process of putting things into groups based on features","cn":"分類(行為/結果)","sentence":"The library uses the Dewey Decimal system for the ________ of books. Accurate ________ of species is essential for biological research.","cnSentence":"圖書館使用杜威十進位法對書籍進行分類。物種的準確分類對生物研究至關重要。"},{"word":"classify","pos":"v.","cat":"v","en":"to divide things into groups according to their type","cn":"將...分類","sentence":"Biologists ________ animals based on their genetic characteristics. It is hard to ________ this music because it blends many styles.","cnSentence":"生物學家根據遺傳特徵將動物分類。很難將這種音樂分類，因為它融合了許多風格。"},{"word":"classified","pos":"adj.","cat":"adj","en":"officially secret or divided into groups","cn":"機密的；分類的","sentence":"The government released documents that were previously ________. You can find job listings in the ________ section of the newspaper.","cnSentence":"政府公開了以前被列為機密的文件。你可以在報紙的分類廣告欄找到工作職缺。"},{"word":"category","pos":"n.","cat":"n","en":"a group of people or things with shared characteristics","cn":"類別","sentence":"This book falls into the ________ of historical fiction. Winners are selected from each ________ of the competition.","cnSentence":"這本書屬於歷史小說類別。獲勝者是從比賽的每個類別中選出的。"},{"word":"categorize","pos":"v.","cat":"v","en":"to put people or things into particular groups","cn":"將...歸類","sentence":"The teacher asked the students to ________ the words by their part of speech. It is difficult to ________ his art into a single movement.","cnSentence":"老師要求學生按詞性將單字歸類。很難將他的藝術歸類為單一運動。"},{"word":"categorization","pos":"n.","cat":"n","en":"the process of grouping items based on common qualities","cn":"歸類；範疇化","sentence":"The ________ of different psychological disorders helps in diagnosis. Digital tools allow for the quick ________ of large data sets.","cnSentence":"不同心理障礙的歸類有助於診斷。數位工具允許對大型數據集進行快速歸類。"},{"word":"cling","pos":"v.","cat":"v","en":"to stick closely to something or hold tight","cn":"緊抓；黏著","sentence":"Wet clothes tend to ________ to the body. Some children ________ to their parents on the first day of school.","cnSentence":"濕衣服容易黏在身上。有些孩子在開學第一天會緊緊黏著父母。"},{"word":"comprehend","pos":"v.","cat":"v","en":"to understand something completely","cn":"理解；領會","sentence":"It is difficult to ________ the scale of the universe. He failed to ________ the seriousness of the situation until it was too late.","cnSentence":"很難理解宇宙的規模。直到為時已晚，他才領會到局勢的嚴重性。"},{"word":"comprehension","pos":"n.","cat":"n","en":"the power to understand or an exercise to test this","cn":"理解(力)；理解測驗","sentence":"The reading ________ task was too difficult for the young students. This problem is beyond my ________; I need someone to explain it.","cnSentence":"這項閱讀理解任務對年幼的學生來說太難了。這個問題超出了我的理解範圍；我需要有人解釋一下。"},{"word":"comprehensive","pos":"adj.","cat":"adj","en":"including all, or almost all, the items or details needed","cn":"全面的；詳盡的","sentence":"The insurance policy offers ________ coverage for all types of accidents. We need a ________ study of the effects of climate change.","cnSentence":"該保險政策為各類事故提供全面的保障。我們需要對氣候變遷的影響進行全面的研究。"},{"word":"accustom","pos":"v.","cat":"v","en":"to make someone familiar with new conditions","cn":"使習慣於","sentence":"It took a while to ________ myself to the humid climate of the tropical island.","cnSentence":"花了一段時間才讓我自己習慣這座熱帶島嶼潮濕的氣候。"},{"word":"be accustomed to + N/Ving","pos":"adj.","cat":"adj","en":"familiar with something so that it seems normal","cn":"習慣的","sentence":"She __________________ waking up early to avoid the rush hour traffic.","cnSentence":"她習慣早起以避開尖峰時段的交通。"},{"word":"congregate","pos":"v.","cat":"v","en":"to come together in a large group of people or animals","cn":"聚集","sentence":"Crowds began to ________ in the town square to hear the divine music.","cnSentence":"人群開始在城鎮廣場聚集，聆聽那神聖的音樂。"},{"word":"congregation","pos":"n.","cat":"n","en":"a group of people assembled for religious worship","cn":"(教堂的)會眾；人群","sentence":"The ________ listened intently to the priest\u0027s sermon on obedience.","cnSentence":"會眾專注地聽著牧師關於服從的布道。"},{"word":"custody","pos":"n.","cat":"n","en":"the legal right to care for someone or the state of being kept by police","cn":"監護權；拘留","sentence":"After the divorce, the parents shared joint ________ of their children. The suspect is currently in police ________.","cnSentence":"離婚後，父母共同擁有子女的監護權。嫌疑人目前正由警方拘留中。"},{"word":"disperse","pos":"v.","cat":"v","en":"to spread across a wide area or move in different directions","cn":"散開；驅散","sentence":"The police used tear gas to ________ the crowd after the protest turned violent.","cnSentence":"在抗議演變成暴力後，警察使用催淚瓦斯驅散人群。"},{"word":"dispersion","pos":"n.","cat":"n","en":"the action or process of distributing things or people over a wide area","cn":"散布；分散","sentence":"The ________ of seeds by wind is a common biological process.","cnSentence":"透過風力傳播種子是一種常見的生物過程。"},{"word":"embody","pos":"v.","cat":"v","en":"to represent a quality or an idea exactly","cn":"體現；使具體化","sentence":"These new laws ________ the principles of justice and equality. She ________ the spirit of kindness in everything she does.","cnSentence":"這些新法律體現了正義和平等的原則。她在所做的每一件事中都體現了仁慈的精神。"},{"word":"embodiment","pos":"n.","cat":"n","en":"someone or something that is a perfect example of a quality","cn":"化身；典型","sentence":"He is considered the ________ of courage for his actions during the fire.","cnSentence":"因為他在火災中的表現，他被視為勇氣的化身。"},{"word":"empirical","pos":"adj.","cat":"adj","en":"based on what is experienced or seen rather than on theory","cn":"以經驗為據的；實證的","sentence":"Scientists require ________ evidence before they can accept a new theory. Our findings are based on ________ data collected over ten years.","cnSentence":"科學家在接受新理論之前需要實證證據。我們的發現是基於十年間收集的實證數據。"},{"word":"empiricism","pos":"n.","cat":"n","en":"the belief that knowledge comes from experience and observation","cn":"經驗主義","sentence":"The philosophy of ________ stresses the importance of sensory perception.","cnSentence":"經驗主義哲學強調感官知覺的重要性。"},{"word":"exclusion","pos":"n.","cat":"n","en":"the act of preventing someone from entering a place or taking part","cn":"排除；排斥","sentence":"The ________ of women from the club caused a major public controversy. Social ________ can lead to feelings of loneliness and depression.","cnSentence":"該俱樂部對女性的排斥引發了重大的公眾爭議。社會排斥可能導致孤獨感和憂鬱。"},{"word":"exclude","pos":"v.","cat":"v","en":"to prevent someone from being part of an activity or group","cn":"排除；不包括","sentence":"Please do not ________ any relevant details from your final report. The price of the tour ________ meals and drinks.","cnSentence":"請不要在你的最終報告中排除任何相關細節。旅費不包括餐飲。"},{"word":"exclusive","pos":"adj.","cat":"adj","en":"limited to only one person or group; expensive and high-quality","cn":"獨家的；高級的","sentence":"The hotel has an ________ beach that is only for the use of its guests. We have ________ rights to broadcast the football match.","cnSentence":"這家飯店擁有一片僅供住客使用的專屬海灘。我們擁有這場足球賽的獨家轉播權。"},{"word":"graze","pos":"v.","cat":"v","en":"(of animals) to eat grass; to break the surface of the skin","cn":"吃草；擦傷","sentence":"The cattle were left to ________ peacefully in the green fields. He fell off his bike and ________ his knee on the pavement.","cnSentence":"牛群被留在綠地裡安靜地吃草。他從腳踏車上摔下來，膝蓋在人行道上擦傷了。"},{"word":"account for","pos":"phr.v","cat":"v","en":"To form a particular amount; to explain the cause of.","cn":"佔比例；解釋","sentence":"High heating costs ________ 40% of the budget. How do you ________ the missing files?","cnSentence":"高額暖氣費佔預算的 40%。你如何解釋遺失的檔案？"},{"word":"unaccounted for","pos":"adj.","cat":"adj","en":"Missing; not together with others.","cn":"下落不明；失蹤","sentence":"After the flood, three hikers were still ________.","cnSentence":"洪水過後，仍有三名登山者下落不明。"},{"word":"gratitude","pos":"n.","cat":"n","en":"The feeling of being grateful and wanting to express thanks.","cn":"感激；謝意","sentence":"She sent a bouquet of flowers to show her ________ for his help.","cnSentence":"她送了一束花以表達對他幫助的感激之情。"},{"word":"intervene with","pos":"v.","cat":"v","en":"To intentionally become involved in a difficult situation.","cn":"干預；介入","sentence":"The government had to ________ the protest to prevent the strike from becoming violent.","cnSentence":"政府不得不介入，以防止罷工演變成暴力衝突。"},{"word":"be obliged to V","pos":"adj.","cat":"adj","en":"Forced to do something because it is a law or duty.","cn":"有義務的；被迫的","sentence":"Drivers ________________ wear seatbelts at all times.","cnSentence":"駕駛員在法律上有義務隨時繫好安全帶。"},{"word":"rally","pos":"v/n","cat":"v","en":"To come together for support; a large public meeting.","cn":"集合；大會","sentence":"The activists held a ________ downtown to protest the new tax law.","cnSentence":"活動人士在市中心舉行大會抗議新稅法。"},{"word":"access","pos":"v","cat":"v","en":"being able to use or see something.","cn":"能取得","sentence":"You need a password to __________ the secure database.","cnSentence":"你需要密碼才能進入這個安全的資料庫。"},{"word":"gain access to N","pos":"n","cat":"n","en":"The right or opportunity to use or see something.","cn":"存取；管道","sentence":"You need a password to _________________ the secure database.","cnSentence":"你需要密碼才能進入這個安全的資料庫。"},{"word":"conduct","pos":"v.","cat":"v","en":"To organize/perform an activity; lead music; transmit heat.","cn":"執行；指揮；導熱","sentence":"The university will ________ a survey on student mental health.","cnSentence":"大學將針對學生的心理健康進行一項調查。"},{"word":"Conduct a survey / experiment","pos":"v.","cat":"v","en":"To organize and perform a particular activity.","cn":"進行；執行","sentence":"The medical team will ________ a clinical trial to test the new vaccine.","cnSentence":"醫療團隊將進行一項臨床試驗來測試這種新疫苗。"},{"word":"Conduct heat / electricity","pos":"v.","cat":"v","en":"To allow substances to flow through.","cn":"傳導 (熱/電)","sentence":"Copper is a popular material because it ________ electricity extremely well.","cnSentence":"銅是一種常用的材料，因為它導電性能極佳。"},{"word":"Conduct an orchestra","pos":"v.","cat":"v","en":"To direct the performance of musicians.","cn":"指揮 (管弦樂團)","sentence":"He was invited to ________ the Berlin Philharmonic in their next concert.","cnSentence":"他受邀在柏林愛樂樂團的下一場音樂會中擔任指揮。"},{"word":"Conduct a train","pos":"v.","cat":"v","en":"To be in charge of a train (attending to passengers).","cn":"帶領；帶位 (車長職責)","sentence":"The staff member will ________ passengers to their designated seats.","cnSentence":"工作人員將引導乘客前往指定的座位。"},{"word":"Conduct oneself","pos":"v.","cat":"v","en":"To behave in a particular way.","cn":"表現；舉止","sentence":"He ________ himself with great dignity during the difficult trial.","cnSentence":"在那場艱難的審判中，他的舉止表現得非常有尊嚴。"},{"word":"General Conduct","pos":"n.","cat":"n","en":"The way a person behaves in a particular place.","cn":"行為；操守","sentence":"The student was suspended for poor ________ in the classroom.","cnSentence":"該學生因在教室裡行為不檢而被停學。"},{"word":"consistent","pos":"adj.","cat":"adj","en":"Always behaving or happening in a similar, positive way.","cn":"始終如一的","sentence":"Her work has been ________ and high-quality throughout the year.","cnSentence":"她全年的工作表現始終如一且高品質。"},{"word":"impending","pos":"adj.","cat":"adj","en":"(Usually bad) referring to an event about to happen.","cn":"即將發生的","sentence":"The dark clouds warned us of the ________ storm.","cnSentence":"烏雲警告我們暴風雨即將來臨。"},{"word":"halt","pos":"v/n","cat":"v","en":"To stop moving or happening.","cn":"停止；終止","sentence":"Production came to a ________ because of the power failure.","cnSentence":"由於停電，生產陷入了停頓。"},{"word":"regulate","pos":"v.","cat":"v","en":"To control something, especially by a certain system.","cn":"調節；管制","sentence":"The government needs to ________ the prices of essential medicines.","cnSentence":"政府需要管制必需藥品的價格。"},{"word":"perspire","pos":"v.","cat":"v","en":"To sweat (often used in a more formal context).","cn":"流汗","sentence":"He began to ________ heavily under the hot stage lights.","cnSentence":"在炎熱的舞台燈光下，他開始大量流汗。"},{"word":"aspire","pos":"v.","cat":"v","en":"To have a strong desire to achieve or become something.","cn":"渴望；追求","sentence":"Many young athletes ________ to compete in the Olympic Games.","cnSentence":"許多運動員渴望能參加奧運比賽。"},{"word":"substitute","pos":"v/n","cat":"v","en":"To use something new in place of something else.","cn":"代替(品)","sentence":"You can ________ honey for sugar in this recipe.","cnSentence":"在食譜中，你可以用蜂蜜代替砂糖。"},{"word":"validate","pos":"v.","cat":"v","en":"To prove that something is real, correct, or sound.","cn":"使有效；證實","sentence":"The experiments were designed to ________ the scientist\u0027s theory.","cnSentence":"這些實驗旨在證實這位科學家的理論。"},{"word":"expire","pos":"v.","cat":"v","en":"To come to an end or stop being valid.","cn":"到期；結束","sentence":"My driver\u0027s license will ________ next month; I need to renew it.","cnSentence":"我的駕照下個月到期，我需要去換發。"},{"word":"assist","pos":"v.","cat":"v","en":"To help someone.","cn":"幫助","sentence":"The computer program is designed to ________ users with data entry.","cnSentence":"該程式旨在幫助使用者進行資料輸入。"},{"word":"resist","pos":"v.","cat":"v","en":"To fight against or refuse to accept.","cn":"抵抗","sentence":"It was hard to ________ the temptation of the chocolate cake.","cnSentence":"很難抵抗巧克力蛋糕的誘惑。"},{"word":"insist on","pos":"v.","cat":"v","en":"To state firmly that something must happen.","cn":"堅持(要求)","sentence":"I ________ ___ paying for the dinner tonight.","cnSentence":"我堅持今天要付晚餐的錢。"},{"word":"persist","pos":"v.","cat":"v","en":"for a phenomenon to continue, to last","cn":"持續","sentence":"If the symptoms ________ for more than three days, consult a doctor.","cnSentence":"如果症狀持續超過三天，請看醫生。"},{"word":"persist in","pos":"v.","cat":"v","en":"to continue to do something in a determined way but usuallyunreasonable","cn":"堅持(不懈)","sentence":"If you______ ____ asking awkward questions, then the boss or the supervisor may feel annoyed.","cnSentence":"如果你執意要問這些奇怪的問題，你的老闆或主管會感到惱怒"},{"word":"persistent","pos":"adj.","cat":"adj","en":"continuous","cn":"持續的","sentence":"Symptoms of the illness include a high temperature and a ____________ dry cough.","cnSentence":"此疾病症狀包括高燒和持久乾咳。"},{"word":"persistence","pos":"n.","cat":"n","en":"determination","cn":"堅持(不懈)","sentence":"Her ___________ and enthusiasm have helped the group to achieve its international success.","cnSentence":"她的堅持不懈和滿腔熱忱幫助該集團在國際上獲得成功"},{"word":"Wage","pos":"n.","cat":"n","en":"Money paid weekly or hourly for manual labor.","cn":"工資","sentence":"The minimum ________ has been increased to help low-income workers.","cnSentence":"基本工資已調高以幫助低收入勞工。"},{"word":"Salary","pos":"n.","cat":"n","en":"Fixed amount of money paid monthly or annually.","cn":"薪水","sentence":"She receives a competitive monthly ________ as an engineer.","cnSentence":"作為工程師，她領取具競爭力的月薪。"},{"word":"Revenue","pos":"n.","cat":"n","en":"Total money coming in before expenses.","cn":"營收","sentence":"The company\u0027s annual ________ increased by 20% this year.","cnSentence":"該公司的年度營收今年增長了 20%。"}];
const TESTABLE_WORDS=WORDS.filter(w=>WORDS.filter(x=>x.cat===w.cat&&x.word!==w.word).length>=3);
let questions=[],index=0,score=0,wrongWords=[],lookUpWords=[],answered=false;
const byWord=Object.fromEntries(WORDS.map(w=>[w.word.toLowerCase(),w]));
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function startQuiz(){
  const name=document.getElementById("studentName").value.trim();
  if(!name){alert("Please enter your name first.");return}
  const raw=document.getElementById("questionCount").value;
  const count=raw==="all"?TESTABLE_WORDS.length:Math.min(Number(raw),TESTABLE_WORDS.length);
  questions=shuffle([...TESTABLE_WORDS]).slice(0,count).map(answer=>{
    const choices=shuffle(WORDS.filter(w=>w.cat===answer.cat&&w.word!==answer.word)).slice(0,3);
    return {answer,options:shuffle([answer,...choices])};
  }).filter(q=>q.options.length===4);
  document.getElementById("start").style.display="none";document.getElementById("quiz").style.display="block";
  render();
}
function clickableSentence(text){
  return String(text).split(/(_{3,}|[A-Za-z][A-Za-z'-]*)/g).map(part=>{
    if(/_{3,}/.test(part))return '<span class="blank">__________</span>';
    if(/^[A-Za-z][A-Za-z'-]*$/.test(part))return `<span class="w" data-word="${escapeHtml(part)}" onclick="lookup(this)">${escapeHtml(part)}</span>`;
    return escapeHtml(part);
  }).join("");
}
function render(){
  answered=false;const q=questions[index],pct=Math.round(index/questions.length*100);
  document.getElementById("score").textContent=score;document.getElementById("total").textContent=questions.length;
  document.getElementById("progressText").textContent=`Question ${index+1} of ${questions.length}`;document.getElementById("progressPct").textContent=pct+"%";document.getElementById("progressFill").style.width=pct+"%";document.getElementById("qnum").textContent=`Question ${index+1}`;
  document.getElementById("passage").innerHTML=clickableSentence(q.answer.sentence);
  document.getElementById("helper").className="helper";document.getElementById("feedback").className="feedback";document.getElementById("next").className="next";
  document.getElementById("opts").innerHTML=q.options.map((w,i)=>`<button class="opt" data-word="${escapeHtml(w.word)}" onclick="choose(this.dataset.word,this)"><span class="letter">${"ABCD"[i]}</span>${escapeHtml(w.word)}</button>`).join("");
}
function choose(word,btn){
  if(answered)return;answered=true;const q=questions[index],correct=word===q.answer.word;if(correct)score++;else if(!wrongWords.includes(q.answer.word))wrongWords.push(q.answer.word);
  document.getElementById("score").textContent=score;
  [...document.querySelectorAll(".opt")].forEach(b=>{b.disabled=true;const value=b.textContent.slice(1);if(value===q.answer.word)b.classList.add("correct");else if(b===btn)b.classList.add("wrong")});
  const clueWords=q.answer.sentence.replace(/_{3,}/g,"").match(/[A-Za-z][A-Za-z'-]*/g)||[];const clues=new Set(clueWords.filter(w=>w.length>5).slice(0,5).map(w=>w.toLowerCase()));document.querySelectorAll(".w").forEach(w=>{if(clues.has(w.dataset.word.toLowerCase()))w.classList.add("clue")});
  document.getElementById("feedback").innerHTML='<div class="fb-title">Vocabulary feedback: all four choices</div>'+q.options.map(w=>`<div class="fb-item ${w.word===q.answer.word?"answer":""}"><div class="fb-word">${escapeHtml(w.word)} ${w.word===q.answer.word?"(answer)":""}</div><div>${escapeHtml(w.en)}</div><div class="fb-cn">${escapeHtml(w.cn)}</div></div>`).join("");
  document.getElementById("feedback").className="feedback show";const next=document.getElementById("next");next.textContent=index===questions.length-1?"See results":"Next question";next.className="next show";
}
function nextQuestion(){index++;if(index>=questions.length)finish();else render()}
function lookup(el){
  const word=el.dataset.word.toLowerCase(),helper=document.getElementById("helper");if(word.length>2&&!lookUpWords.includes(word))lookUpWords.push(word);
  helper.className="helper show";const local=byWord[word];
  if(local){helper.innerHTML=`<strong>${escapeHtml(local.word)}</strong> <em>${escapeHtml(local.pos)}</em><br>${escapeHtml(local.en)}<br><span class="helper-cn">${escapeHtml(local.cn)}</span>`;return}
  helper.innerHTML=`<strong>${escapeHtml(word)}</strong><br><em>Looking up definition...</em>`;
  fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word)).then(r=>{if(!r.ok)throw 0;return r.json()}).then(data=>{const m=data[0]?.meanings?.[0];helper.innerHTML=`<strong>${escapeHtml(word)}</strong> <em>${escapeHtml(m?.partOfSpeech||"")}</em><br>${escapeHtml(m?.definitions?.[0]?.definition||"Definition not found.")}`}).catch(()=>helper.innerHTML=`<strong>${escapeHtml(word)}</strong><br><em>Definition not found. Try another word.</em>`);
}
function speak(text){if(!speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.9;const v=speechSynthesis.getVoices();u.voice=v.find(x=>x.lang.startsWith("en")&&/female|zira|samantha/i.test(x.name))||v.find(x=>x.lang==="en-US")||null;speechSynthesis.speak(u)}
function speakCurrent(){speak(questions[index].answer.sentence.replace(/_{3,}/g,"blank"))}
function finish(){
  document.getElementById("quiz").style.display="none";document.getElementById("result").style.display="block";const pct=Math.round(score/questions.length*100);
  document.getElementById("finalScore").textContent=`${score} / ${questions.length}`;document.getElementById("finalPct").textContent=`${pct}% correct`;
  document.getElementById("review").innerHTML=`<strong>Words to review:</strong> ${escapeHtml(wrongWords.join(", ")||"none")}<br><strong>Words looked up:</strong> ${escapeHtml(lookUpWords.join(", ")||"none")}`;
  submitResult();
}
async function submitResult(){
  const status=document.getElementById("status"),name=document.getElementById("studentName").value.trim(),pct=Math.round(score/questions.length*100),timestamp=new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"});
  status.className="status";status.textContent="Sending result...";
  const payload={testDateTime:timestamp,studentName:name,unitName:UNIT_NAME,percentage:pct+"%",wrongWords:wrongWords.join(", ")||"none",lookUpWords:lookUpWords.join(", ")||"none",timestamp,percent:pct,score,total:questions.length,week:UNIT_NAME,passageWords:lookUpWords.join(", ")||"none"};
  try{await fetch(GOOGLE_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});status.className="status ok";status.textContent="Result sent successfully. Your teacher can now see it in the spreadsheet."}
  catch(e){status.className="status err";status.textContent="Result could not be sent. Check the internet connection and tap Send result again."}
}
</script>
