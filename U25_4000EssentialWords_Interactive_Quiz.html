<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4000 Essential Words – Level 5 Unit 25 | Interactive Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--font-heading:'Playfair Display',Georgia,serif;--font-body:'DM Sans','Segoe UI',sans-serif;--color-primary:#1a3a5c;--color-accent:#c8962e;--color-correct:#2d7a4f;--color-incorrect:#b53a2f;--color-clue:#fff3a3;--color-surface:#faf8f5;--color-card:#ffffff;--radius:12px;--shadow:0 4px 24px rgba(26,58,92,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--color-surface);color:#1a2433;min-height:100vh}
header{background:var(--color-primary);color:#fff;padding:18px 24px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.header-title{font-family:var(--font-heading);font-size:1.15rem;line-height:1.25}
.header-sub{font-size:.78rem;opacity:.75;margin-top:2px}
.score-badge{background:var(--color-accent);color:#fff;border-radius:20px;padding:6px 16px;font-weight:600;font-size:.9rem;white-space:nowrap;min-width:90px;text-align:center}
main{max-width:820px;margin:0 auto;padding:28px 16px 60px}
.progress-wrap{margin-bottom:18px}
.progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:#556;margin-bottom:6px}
.progress-bar-bg{background:#dde3ea;border-radius:8px;height:8px}
.progress-bar-fill{height:8px;border-radius:8px;background:linear-gradient(90deg,var(--color-primary),var(--color-accent));transition:width .35s ease}
.card{background:var(--color-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 28px 22px;margin-bottom:18px}
.q-number{font-size:.78rem;font-weight:600;color:var(--color-accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.q-passage{font-size:1.04rem;line-height:1.75;color:#1e2c3a;margin-bottom:16px}
.q-passage .word{cursor:pointer;border-bottom:1px dotted #aab;transition:background .15s;border-radius:2px;padding:0 1px}
.q-passage .word:hover{background:#e8f0fc}
.clue-highlight{background:var(--color-clue)!important;border-radius:3px;padding:0 2px}
.tts-btn{background:none;border:none;cursor:pointer;color:var(--color-primary);font-size:.95rem;margin-right:8px;vertical-align:middle;opacity:.7;transition:opacity .15s}
.tts-btn:hover{opacity:1}
.word-helper{background:#eef4fb;border-left:4px solid var(--color-primary);border-radius:0 8px 8px 0;padding:10px 14px;font-size:.88rem;margin-bottom:14px;display:none;animation:fadeIn .2s}
.word-helper.visible{display:block}
.word-helper strong{color:var(--color-primary)}
.helper-phonetic{color:#778;font-style:italic;font-size:.82rem}
.helper-meaning{margin-top:4px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
@media(max-width:520px){.options-grid{grid-template-columns:1fr}}
.opt-btn{display:flex;align-items:center;gap:10px;background:#f0f4fa;border:2px solid transparent;border-radius:9px;padding:11px 14px;font-family:var(--font-body);font-size:.95rem;color:#1a2433;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;text-align:left;line-height:1.4}
.opt-btn:hover:not(:disabled){background:#dde8f7;border-color:var(--color-primary);transform:translateY(-1px)}
.opt-btn .opt-label{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--color-primary);color:#fff;font-weight:700;font-size:.82rem;flex-shrink:0}
.opt-btn.correct{background:#d4edda;border-color:var(--color-correct)}
.opt-btn.correct .opt-label{background:var(--color-correct)}
.opt-btn.incorrect{background:#f8d7da;border-color:var(--color-incorrect)}
.opt-btn.incorrect .opt-label{background:var(--color-incorrect)}
.opt-btn:disabled{cursor:default;transform:none}
.feedback-box{display:none;margin-top:16px;border-radius:var(--radius);overflow:hidden;border:1px solid #dde3ea;animation:fadeIn .25s}
.feedback-box.visible{display:block}
.feedback-header{padding:9px 16px;font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:8px}
.feedback-header.correct-header{background:#d4edda;color:var(--color-correct)}
.feedback-header.incorrect-header{background:#f8d7da;color:var(--color-incorrect)}
.vocab-cards{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:540px){.vocab-cards{grid-template-columns:1fr}}
.vocab-card{padding:12px 14px;border-right:1px solid #eee;border-bottom:1px solid #eee;font-size:.84rem;line-height:1.5}
.vocab-card:nth-child(2n){border-right:none}
.vocab-card .vc-word{font-weight:700;color:var(--color-primary);font-size:.92rem}
.vocab-card .vc-en{color:#334;margin:2px 0}
.vocab-card .vc-cn{color:#667;font-size:.82rem}
.vocab-card .vc-ex{color:#445;font-style:italic;font-size:.82rem;margin-top:3px;border-left:2px solid var(--color-accent);padding-left:7px}
.nav-row{display:flex;justify-content:flex-end;margin-top:16px}
.next-btn{background:var(--color-primary);color:#fff;border:none;border-radius:9px;padding:11px 26px;font-family:var(--font-body);font-size:.95rem;font-weight:600;cursor:pointer;display:none;align-items:center;gap:8px;transition:background .15s,transform .1s}
.next-btn:hover{background:#244d7a;transform:translateY(-1px)}
.next-btn.visible{display:inline-flex}
#results-screen{display:none;text-align:center}
#results-screen.visible{display:block}
.results-card{background:var(--color-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:48px 32px;max-width:500px;margin:40px auto}
.results-icon{font-size:3.5rem;margin-bottom:16px}
.results-score{font-family:var(--font-heading);font-size:3rem;color:var(--color-primary)}
.results-pct{font-size:1.1rem;color:var(--color-accent);font-weight:600;margin-bottom:8px}
.results-msg{font-size:1.05rem;color:#334;margin-bottom:8px}
.results-msg-cn{font-size:.95rem;color:#667}
.restart-btn{margin-top:28px;background:var(--color-primary);color:#fff;border:none;border-radius:9px;padding:13px 36px;font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s}
.restart-btn:hover{background:#244d7a}
.gform-banner{background:linear-gradient(135deg,#1a3a5c,#244d7a);color:#fff;border-radius:var(--radius);padding:18px 22px;margin-bottom:22px;display:flex;align-items:center;gap:14px;font-size:.9rem;line-height:1.5}
.gform-banner i{font-size:1.4rem;flex-shrink:0;color:var(--color-accent)}
#submit-form{margin-top:22px}
#submit-form input{border:2px solid #dde3ea;border-radius:8px;padding:10px 14px;font-family:var(--font-body);font-size:.95rem;width:100%;margin-bottom:10px;transition:border-color .15s}
#submit-form input:focus{outline:none;border-color:var(--color-primary)}
#submit-form .submit-btn{background:var(--color-accent);color:#fff;border:none;border-radius:8px;padding:11px 26px;font-family:var(--font-body);font-size:.95rem;font-weight:600;cursor:pointer;width:100%;transition:background .15s}
#submit-form .submit-btn:hover{background:#a87820}
#submit-msg{font-size:.88rem;margin-top:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<header>
  <div>
    <div class="header-title">4000 Essential Words — Level 5, Unit 25</div>
    <div class="header-sub">Interactive Vocabulary Quiz &nbsp;|&nbsp; 100 Questions</div>
  </div>
  <div class="score-badge" id="score-badge">Score: 0</div>
</header>
<main>
  <div class="gform-banner">
    <i class="fa-brands fa-google"></i>
    <div>
      <strong>Submit your result to the teacher!</strong> After finishing, enter your name and student ID.
      <br><span style="font-size:.82rem;opacity:.8;">完成後輸入姓名與學號，成績將自動傳送給老師。</span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="q-counter">Question 1 of 100</span><span id="q-pct">0%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:1%"></div></div>
  </div>
  <div id="quiz-screen">
    <div class="card">
      <div class="q-number" id="q-number">Q1</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
        <button class="tts-btn" onclick="readPassage()" title="Read aloud"><i class="fa-solid fa-volume-high"></i></button>
        <span style="font-size:.78rem;color:#889;">Click any word for definition</span>
      </div>
      <div class="q-passage" id="q-passage"></div>
      <div class="word-helper" id="word-helper">
        <strong id="helper-word"></strong><span class="helper-phonetic" id="helper-phonetic"></span>
        <div class="helper-meaning" id="helper-meaning"></div>
      </div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-box" id="feedback-box">
        <div class="feedback-header" id="feedback-header"></div>
        <div class="vocab-cards" id="vocab-cards"></div>
      </div>
    </div>
    <div class="nav-row"><button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question <i class="fa-solid fa-arrow-right"></i></button></div>
  </div>
  <div id="results-screen">
    <div class="results-card">
      <div class="results-icon" id="results-icon">🎉</div>
      <div class="results-score" id="results-score">0 / 100</div>
      <div class="results-pct" id="results-pct"></div>
      <div class="results-msg" id="results-msg"></div>
      <div class="results-msg-cn" id="results-msg-cn"></div>
      <div id="submit-form">
        <p style="font-weight:600;margin-bottom:10px;font-size:.92rem;"><i class="fa-solid fa-paper-plane" style="color:var(--color-accent)"></i> &nbsp;Send your score to the teacher:</p>
        <input type="text" id="student-name" placeholder="Your full name (姓名)" />
        <input type="text" id="student-id" placeholder="Student ID / Class number (學號)" />
        <button class="submit-btn" onclick="submitScore()"><i class="fa-solid fa-cloud-arrow-up"></i> &nbsp;Submit Score</button>
        <div id="submit-msg"></div>
      </div>
      <button class="restart-btn" onclick="restartQuiz()"><i class="fa-solid fa-rotate-right"></i> &nbsp;Try Again</button>
    </div>
  </div>
</main>
<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwN0JbQwvPmsAphNhq9F0nWY8s5Ttr_NLeVofihnI1BqNU_2L4-aa3SRavPkEyUKC7trg/exec";

/* Answer key pattern (repeating every 20): B C D A D | D A C B A | D B C A C | A D B C B */
const questions = [
  // Q1-20
  {q:"The military helicopter and small private __________ were both circling the rescue zone when the earthquake struck.",options:["zoology","aircraft","species","swamp"],answer:"aircraft",clues:["military","helicopter","private","circling","rescue","earthquake"]},
  {q:"The young pop star became a huge __________ after her debut song gained over two billion views online worldwide.",options:["institute","celebrity","principle","zoology"],answer:"celebrity",clues:["pop star","debut","song","billion","views","online"]},
  {q:"The city council approved plans to build a new __________ bridge made entirely of reinforced steel and glass.",options:["rural","secluded","ethical","concrete"],answer:"concrete",clues:["city council","bridge","reinforced","steel","glass"]},
  {q:"The general's __________ victory at the battlefield led the troops to push forward without hesitation.",options:["decisive","extinct","hardy","overhead"],answer:"decisive",clues:["general","victory","battlefield","troops","push forward","hesitation"]},
  {q:"Professor Chen is highly __________ in the academic community for her groundbreaking research on climate change.",options:["rural","secluded","ethical","esteemed"],answer:"esteemed",clues:["Professor","highly","academic","community","groundbreaking","research","climate"]},
  {q:"The research committee debated whether the clinical trial using healthy volunteers was truly __________ and fair.",options:["extinct","hardy","overhead","ethical"],answer:"ethical",clues:["research","committee","clinical trial","volunteers","fair","debated"]},
  {q:"Scientists confirmed that the woolly mammoth has been __________ for thousands of years, with no living specimens remaining.",options:["extinct","hardy","overhead","ethical"],answer:"extinct",clues:["Scientists","woolly","mammoth","thousands","years","living","specimens"]},
  {q:"Mountain goats are incredibly __________ animals that can survive harsh winters and rocky terrain without shelter.",options:["secluded","rural","decisive","hardy"],answer:"hardy",clues:["Mountain","goats","survive","harsh","winters","rocky","terrain","shelter"]},
  {q:"The new research __________ will focus on developing treatments for rare tropical diseases found in developing countries.",options:["celebrity","zoology","institute","swamp"],answer:"institute",clues:["new","research","developing","treatments","rare","tropical","diseases"]},
  {q:"She could not stop thinking about her ex-boyfriend, and her __________ eventually destroyed her new relationship.",options:["principle","species","jealousy","zoology"],answer:"jealousy",clues:["ex-boyfriend","thinking","eventually","destroyed","new","relationship"]},
  // Q11-20
  {q:"Every spring, millions of butterflies __________ south to warmer regions where food and sunshine are more plentiful.",options:["nurture","traverse","migrate","swamp"],answer:"migrate",clues:["spring","butterflies","south","warmer","regions","food","sunshine","plentiful"]},
  {q:"Good parents consistently __________ their children's creativity, encouraging them to explore new hobbies and develop talents.",options:["traverse","migrate","nurture","swamp"],answer:"nurture",clues:["Good","parents","consistently","creativity","encouraging","explore","hobbies","talents"]},
  {q:"The electrical power lines running __________ above the street were damaged by the strong typhoon winds last night.",options:["overhead","ethically","decisively","rurally"],answer:"overhead",clues:["electrical","power","lines","running","street","damaged","typhoon","winds"]},
  {q:"Scientists have identified over eight million different __________ of living organisms on the Earth's surface today.",options:["celebrity","zoology","institute","species"],answer:"species",clues:["Scientists","identified","eight","million","living","organisms","Earth"]},
  {q:"The wealthy tech billionaire built a luxurious and completely __________ mountain villa far from any busy city.",options:["extinct","hardy","overhead","secluded"],answer:"secluded",clues:["wealthy","billionaire","luxurious","mountain","villa","far","city"]},
  {q:"The young couple finally left the noisy city and moved to a peaceful __________ village in the countryside.",options:["rural","secluded","ethical","concrete"],answer:"rural",clues:["couple","left","noisy","city","moved","peaceful","village","countryside"]},
  {q:"The professor firmly insisted that the new school curriculum must be built on strong academic __________ and values.",options:["jealousy","swamp","celebrity","principle"],answer:"principle",clues:["professor","firmly","curriculum","built","strong","academic","values"]},
  {q:"Local environmentalists urged the government to protect the natural __________ near the river from real estate development.",options:["aircraft","species","swamp","zoology"],answer:"swamp",clues:["environmentalists","government","protect","natural","river","real estate","development"]},
  {q:"The experienced hikers carefully planned a route to __________ the dense rainforest and reach the ancient temple.",options:["nurture","traverse","migrate","swamp"],answer:"traverse",clues:["hikers","planned","route","dense","rainforest","reach","ancient","temple"]},
  {q:"The university opened a new department of __________ to study the behavioral patterns and habitats of wild animals.",options:["celebrity","zoology","institute","swamp"],answer:"zoology",clues:["university","department","study","behavioral","patterns","habitats","wild","animals"]},
  // Q21-40
  {q:"The passenger __________ landed smoothly at the international airport after completing an eleven-hour transoceanic flight.",options:["aircraft","species","swamp","zoology"],answer:"aircraft",clues:["passenger","landed","smoothly","international","airport","eleven-hour","transoceanic"]},
  {q:"The award-winning director invited several famous __________ to attend the exclusive premiere of his long-awaited new film.",options:["institute","celebrities","principle","zoology"],answer:"celebrities",clues:["award-winning","director","invited","famous","exclusive","premiere","long-awaited","film"]},
  {q:"The construction company poured fresh __________ to create a strong and durable foundation for the tall skyscraper.",options:["secluded","rural","ethical","concrete"],answer:"concrete",clues:["construction","poured","fresh","strong","durable","foundation","tall","skyscraper"]},
  {q:"The CEO made a __________ move to cut production costs by automating three entire departments within the company.",options:["decisive","extinct","hardy","overhead"],answer:"decisive",clues:["CEO","cut","production","costs","automating","departments","company"]},
  {q:"The Nobel Prize-winning chemist is widely __________ for his decades of life-saving pharmaceutical research worldwide.",options:["rural","secluded","ethical","esteemed"],answer:"esteemed",clues:["Nobel","Prize","chemist","widely","decades","life-saving","pharmaceutical","research"]},
  {q:"An __________ issue arose when the scientist chose to publish the medical data without the patients' informed consent.",options:["extinct","hardy","overhead","ethical"],answer:"ethical",clues:["issue","scientist","publish","medical","data","patients","consent"]},
  {q:"Many marine biologists fear that the hawksbill sea turtle may soon become __________ due to coastal pollution.",options:["extinct","hardy","overhead","ethical"],answer:"extinct",clues:["marine","biologists","hawksbill","sea turtle","soon","coastal","pollution"]},
  {q:"The __________ desert cactus can survive months without water by storing moisture deep inside its thick outer stem.",options:["secluded","rural","decisive","hardy"],answer:"hardy",clues:["desert","cactus","survive","months","without","water","storing","moisture","thick","stem"]},
  {q:"The national sports __________ announced new training programs to prepare young athletes for the upcoming Olympic Games.",options:["celebrity","zoology","institute","swamp"],answer:"institute",clues:["national","sports","announced","training","programs","athletes","upcoming","Olympic","Games"]},
  {q:"The couple's __________ over each other's old friendships caused constant arguments and eventually led to their breakup.",options:["principle","species","jealousy","zoology"],answer:"jealousy",clues:["couple's","old","friendships","caused","constant","arguments","eventually","breakup"]},
  // Q31-40
  {q:"In autumn, flocks of wild geese __________ thousands of kilometers south to find warmer habitats in Africa.",options:["nurture","traverse","migrate","swamp"],answer:"migrate",clues:["autumn","flocks","wild","geese","thousands","kilometers","warmer","habitats","Africa"]},
  {q:"Good teachers carefully __________ students' natural curiosity by creating engaging lessons that challenge their critical thinking.",options:["traverse","migrate","nurture","swamp"],answer:"nurture",clues:["teachers","carefully","students","curiosity","engaging","lessons","challenge","critical","thinking"]},
  {q:"The airplane sprayed water directly __________ the burning forest area to slow the rapidly spreading wildfire.",options:["overhead","ethically","decisively","rurally"],answer:"overhead",clues:["airplane","sprayed","water","burning","forest","slow","rapidly","spreading","wildfire"]},
  {q:"Biologists have been tracking the three newly discovered __________ of rare deep-sea fish for over five years.",options:["celebrity","zoology","institute","species"],answer:"species",clues:["Biologists","tracking","newly","discovered","rare","deep-sea","fish","five years"]},
  {q:"The elderly monk lives in a completely __________ stone temple, spending his days meditating and reading ancient texts.",options:["extinct","hardy","overhead","secluded"],answer:"secluded",clues:["elderly","monk","stone","temple","meditating","reading","ancient","texts"]},
  {q:"Many young families dream of escaping the crowded city to live in a quiet __________ area with fresh air.",options:["rural","secluded","ethical","concrete"],answer:"rural",clues:["young","families","escaping","crowded","city","quiet","fresh air"]},
  {q:"The environmental activist argued that it is a moral __________ to protect the natural habitats of endangered animals.",options:["jealousy","swamp","celebrity","principle"],answer:"principle",clues:["environmental","activist","moral","protect","natural","habitats","endangered","animals"]},
  {q:"The explorers carefully navigated their small wooden boat through the dark and muddy __________ to reach the hidden village.",options:["aircraft","species","swamp","zoology"],answer:"swamp",clues:["explorers","navigated","wooden","boat","dark","muddy","reach","hidden","village"]},
  {q:"The expedition team took three full days to __________ the snow-covered mountain pass and reach the other valley.",options:["nurture","traverse","migrate","swamp"],answer:"traverse",clues:["expedition","team","snow-covered","mountain","pass","reach","other","valley"]},
  {q:"The professor of __________ spent thirty years studying the feeding habits of large carnivores in the wild.",options:["celebrity","zoology","institute","swamp"],answer:"zoology",clues:["professor","thirty","years","studying","feeding","habits","carnivores","wild"]},
  // Q41-60
  {q:"The rescue helicopter and coast guard __________ searched the entire ocean area for the missing fishing boat crew.",options:["aircraft","species","swamp","zoology"],answer:"aircraft",clues:["rescue","helicopter","coast guard","searched","ocean","missing","fishing","boat","crew"]},
  {q:"The pop __________ wore a dramatic outfit to the award ceremony, attracting thousands of photographers on the red carpet.",options:["institute","celebrity","principle","zoology"],answer:"celebrity",clues:["pop","wore","dramatic","outfit","award","ceremony","photographers","red carpet"]},
  {q:"The old factory building will be demolished and replaced with a new __________ sports arena for the city.",options:["secluded","rural","ethical","concrete"],answer:"concrete",clues:["factory","demolished","replaced","new","sports","arena","city"]},
  {q:"The coach made the __________ call to substitute the star player during the critical final five minutes of the game.",options:["decisive","extinct","hardy","overhead"],answer:"decisive",clues:["coach","substitute","star player","critical","final","five minutes","game"]},
  {q:"The retiring professor was deeply __________ by her students, who presented her with flowers and heartfelt farewell speeches.",options:["rural","secluded","ethical","esteemed"],answer:"esteemed",clues:["retiring","professor","deeply","students","presented","flowers","heartfelt","farewell","speeches"]},
  {q:"The reporter questioned whether it was __________ for the news agency to publish private photographs without permission.",options:["extinct","hardy","overhead","ethical"],answer:"ethical",clues:["reporter","questioned","news agency","publish","private","photographs","permission"]},
  {q:"The passenger pigeon, once numbering in the billions, became completely __________ in 1914 when the last one died.",options:["extinct","hardy","overhead","ethical"],answer:"extinct",clues:["passenger","pigeon","numbering","billions","1914","last one","died"]},
  {q:"The __________ bamboo plant survived the freezing cold winter, the summer drought, and a pest infestation all in one year.",options:["secluded","rural","decisive","hardy"],answer:"hardy",clues:["bamboo","survived","freezing","cold","winter","drought","pest","infestation"]},
  {q:"The research __________ received a major government grant to develop new vaccines for children in tropical countries.",options:["celebrity","zoology","institute","swamp"],answer:"institute",clues:["research","major","government","grant","develop","new","vaccines","children","tropical"]},
  {q:"His intense __________ of his younger colleague's promotion drove him to work longer hours to prove his own worth.",options:["principle","species","jealousy","zoology"],answer:"jealousy",clues:["intense","younger","colleague's","promotion","drove","longer","hours","prove","worth"]},
  // Q61-80
  {q:"Humpback whales __________ annually from the cold Arctic feeding waters to warmer tropical breeding grounds near the equator.",options:["nurture","traverse","migrate","swamp"],answer:"migrate",clues:["Humpback","whales","annually","cold","Arctic","warmer","tropical","breeding","equator"]},
  {q:"A supportive community environment helps __________ children's emotional intelligence and social development effectively.",options:["traverse","migrate","nurture","swamp"],answer:"nurture",clues:["supportive","community","environment","helps","children's","emotional","intelligence","social","development"]},
  {q:"The firefighting helicopter dropped a massive tank of water directly __________ the blazing warehouse to extinguish the flames.",options:["overhead","ethically","decisively","rurally"],answer:"overhead",clues:["firefighting","helicopter","massive","tank","water","blazing","warehouse","extinguish","flames"]},

const vocabDef = {
  "aircraft":{"en":"A vehicle that flies through the air","cn":"飛行器/航空器","ex":"The military aircraft circled the rescue zone."},
  "celebrity":{"en":"A famous person, especially in entertainment","cn":"名人","ex":"The pop star became a huge celebrity overnight."},

  "esteemed":{"en":"Greatly respected and admired","cn":"受尊敬的","ex":"Professor Chen is esteemed for her research on climate change."},
  "ethical":{"en":"Relating to moral principles","cn":"道德的/倫理的","ex":"The committee debated whether the trial was ethical."},

  "rural":{"en":"In or relating to the countryside","cn":"農村的/鄉村的","ex":"The couple moved to a peaceful rural village."},

};

let currentQ=0, score=0, answered=false;
let studentAnswers=new Array(questions.length).fill(null);
let lookedUpWords=new Set();

function renderQuestion(){
  answered=false;
  const q=questions[currentQ],total=questions.length;
  document.getElementById("q-counter").textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById("q-pct").textContent=Math.round((currentQ/total)*100)+"%";
  document.getElementById("progress-fill").style.width=((currentQ/total)*100)+"%";
  document.getElementById("q-number").textContent=`Q${currentQ+1}`;
  document.getElementById("score-badge").textContent=`Score: ${score}`;
  const passageDiv=document.getElementById("q-passage");
  const words=q.q.split(/(\s+)/);
  passageDiv.innerHTML=words.map(token=>{
    if(/\s+/.test(token))return token;
    if(token==="__________")return`<strong style="color:var(--color-primary);font-size:1.05em;">__________</strong>`;
    const clean=token.replace(/[^a-zA-Z'-]/g,"");
    return`<span class="word" data-word="${clean}" onclick="lookupWord('${clean}')">${token}</span>`;
  }).join("");
  document.getElementById("word-helper").classList.remove("visible");
  const grid=document.getElementById("options-grid");
  const labels=["A","B","C","D"];
  grid.innerHTML=q.options.map((opt,i)=>`<button class="opt-btn" onclick="selectAnswer(${i})"><span class="opt-label">${labels[i]}</span>${opt}</button>`).join("");
  document.getElementById("feedback-box").classList.remove("visible");
  document.getElementById("next-btn").classList.remove("visible");
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[currentQ];
  studentAnswers[currentQ]=q.options[idx];
  const btns=document.querySelectorAll(".opt-btn");
  btns.forEach((btn,i)=>{
    btn.disabled=true;
    if(q.options[i]===q.answer)btn.classList.add("correct");
    else if(i===idx)btn.classList.add("incorrect");
  });
  if(q.options[idx]===q.answer)score++;
  const passageDiv=document.getElementById("q-passage");
  passageDiv.querySelectorAll(".word").forEach(span=>{
    const w=span.getAttribute("data-word").toLowerCase();
    if(q.clues&&q.clues.some(c=>w.includes(c.toLowerCase())||c.toLowerCase().includes(w)))span.classList.add("clue-highlight");
  });
  showFeedback(idx);
  document.getElementById("next-btn").classList.add("visible");
  document.getElementById("score-badge").textContent=`Score: ${score}`;
}

function showFeedback(chosenIdx){
  const q=questions[currentQ];
  const correct=q.options[chosenIdx]===q.answer;
  const fb=document.getElementById("feedback-box");
  const fh=document.getElementById("feedback-header");
  fh.className="feedback-header "+(correct?"correct-header":"incorrect-header");
  fh.innerHTML=correct?`<i class="fa-solid fa-circle-check"></i> Correct! The answer is "<strong>${q.answer}</strong>"`:`<i class="fa-solid fa-circle-xmark"></i> The correct answer is "<strong>${q.answer}</strong>"`;
  const cardsDiv=document.getElementById("vocab-cards");
  cardsDiv.innerHTML=q.options.map(opt=>{
    const def=vocabDef[opt]||{en:"—",cn:"—",ex:"—"};
    return`<div class="vocab-card"><div class="vc-word">${opt}<button class="tts-btn" onclick="speak('${opt.replace(/'/g,"\\'")}')"><i class="fa-solid fa-volume-low"></i></button></div><div class="vc-en">${def.en}</div><div class="vc-cn">${def.cn}</div><div class="vc-ex">${def.ex}<button class="tts-btn" onclick="speak(\`${def.ex.replace(/`/g,"'")}\`)"><i class="fa-solid fa-volume-low"></i></button></div></div>`;
  }).join("");
  fb.classList.add("visible");
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=questions.length)showResults();
  else{document.getElementById("word-helper").classList.remove("visible");renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}
}

function showResults(){
  document.getElementById("quiz-screen").style.display="none";
  document.getElementById("results-screen").classList.add("visible");
  const pct=Math.round((score/questions.length)*100);
  document.getElementById("results-score").textContent=`${score} / ${questions.length}`;
  document.getElementById("results-pct").textContent=`${pct}%`;
  document.getElementById("progress-fill").style.width="100%";
  document.getElementById("q-pct").textContent="100%";
  let icon,msg,msgCn;
  if(pct>=90){icon="🏆";msg="Outstanding! You've mastered Unit 25.";msgCn="太棒了！你已精通第25單元！";}
  else if(pct>=75){icon="🎉";msg="Great work! Keep reviewing the tricky ones.";msgCn="表現優異！繼續複習難的字詞。";}
  else if(pct>=60){icon="📚";msg="Good effort! A bit more practice will help.";msgCn="很努力！再多練習幾次就會更好。";}
  else{icon="💪";msg="Keep going! Review the word list and try again.";msgCn="繼續加油！複習字彙表後再試一次。";}
  document.getElementById("results-icon").textContent=icon;
  document.getElementById("results-msg").textContent=msg;
  document.getElementById("results-msg-cn").textContent=msgCn;
}

function restartQuiz(){
  currentQ=0;score=0;answered=false;
  studentAnswers=new Array(questions.length).fill(null);
  lookedUpWords=new Set();
  document.getElementById("results-screen").classList.remove("visible");
  document.getElementById("quiz-screen").style.display="";
  document.getElementById("submit-msg").textContent="";
  renderQuestion();window.scrollTo({top:0,behavior:"smooth"});
}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=0.9;
  const voices=window.speechSynthesis.getVoices();
  const female=voices.find(v=>v.lang.startsWith("en")&&/female|zira|samantha/i.test(v.name));
  if(female)u.voice=female;
  window.speechSynthesis.speak(u);
}

function readPassage(){speak(questions[currentQ].q.replace(/__________/g,"blank"));}

async function lookupWord(word){
  if(!word||word.length<2)return;
  lookedUpWords.add(word);
  const helper=document.getElementById("word-helper");
  document.getElementById("helper-word").textContent=word;
  document.getElementById("helper-phonetic").textContent="";
  document.getElementById("helper-meaning").textContent="Looking up…";
  helper.classList.add("visible");
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
    if(!res.ok)throw new Error("not found");
    const data=await res.json();
    const entry=data[0];
    const phonetic=entry.phonetic||entry.phonetics?.find(p=>p.text)?.text||"";
    const meaning=entry.meanings?.[0]?.definitions?.[0]?.definition||"Definition not found.";
    document.getElementById("helper-phonetic").textContent=phonetic?` ${phonetic}`:"";
    document.getElementById("helper-meaning").textContent=meaning;
  }catch{document.getElementById("helper-meaning").textContent="Definition not found. Try another word.";}
}

async function submitScore(){
  const name=document.getElementById("student-name").value.trim();
  const sid=document.getElementById("student-id").value.trim();
  const msgEl=document.getElementById("submit-msg");
  if(!name||!sid){msgEl.style.color="var(--color-incorrect)";msgEl.textContent="Please enter both your name and student ID.";return;}
  msgEl.style.color="#334";msgEl.textContent="Submitting…";
  const pct=Math.round((score/questions.length)*100);
  const wrongList=questions.filter((q,i)=>studentAnswers[i]!==q.answer).map(q=>q.answer).join(", ");
  const lookedList=Array.from(lookedUpWords).join(", ");
  try{
    const payload={
      testDateTime:new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"}),
      studentName:name+" ("+sid+")",
      unitName:"Level 5 Unit 25",
      percentage:pct+"%",
      wrongWords:wrongList||"none",
      lookUpWords:lookedList||"none"
    };
    await fetch(GOOGLE_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    msgEl.style.color="var(--color-correct)";
    msgEl.textContent=`✅ Submitted! ${name} — ${pct}%`;
  }catch(e){msgEl.style.color="var(--color-incorrect)";msgEl.textContent="Submission failed. Check your internet connection.";}
}

window.speechSynthesis.onvoiceschanged=()=>{};
renderQuestion();
</script>
